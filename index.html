<style>
:root {
  --stage-w: 3784;
  --stage-h: 2838;
  --stage-scale: 1;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
}
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  touch-action: manipulation;
  font-family: Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at 50% 38%, rgba(118, 155, 214, 0.24) 0%, rgba(55, 86, 142, 0.18) 18%, rgba(16, 35, 74, 0.88) 46%, rgba(5, 12, 29, 1) 100%),
    linear-gradient(180deg, #0f2148 0%, #0a1732 36%, #071022 68%, #040811 100%);
  color: #ddd;
}
body { position: fixed; inset: 0; }
#viewer {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding-top: var(--safe-top);
  padding-right: var(--safe-right);
  padding-bottom: var(--safe-bottom);
  padding-left: var(--safe-left);
  box-sizing: border-box;
  scroll-behavior: auto;
}
#viewer.zoom-mode {
  display: block;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x pan-y;
}
#stageShell {
  position: relative;
  flex: 0 0 auto;
  width: calc(var(--stage-w) * 1px);
  height: calc(var(--stage-h) * 1px);
  will-change: width, height;
}
#stage {
  position: relative;
  width: 3784px;
  height: 2838px;
  overflow: visible;
  margin: 0;
  background: transparent;
  transform-origin: top left;
  will-change: transform;
}
.layer {
  position: absolute;
  transform-origin: 0 0;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}
#dial { left: 0; top: 0; width: 3784px; height: 2838px; }
#sec_wheel2 { left: 1520px; top: 1613px; width: 273px; height: 265px; }

#leap{left:2104px;top:1543px;width:56px;height:95px;z-index:9 !important;transform-origin:27px 69px !important;}
#controls {
  position: fixed;
  right: calc(12px + var(--safe-right));
  top: calc(12px + var(--safe-top));
  z-index: 50;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ctrl {
  appearance: none;
  border: 1px solid rgba(255,255,255,.24);
  color: #fff;
  min-width: 52px;
  min-height: 44px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
#hint {
  position: fixed;
  left: calc(12px + var(--safe-left));
  bottom: calc(12px + var(--safe-bottom));
  z-index: 50;
  padding: 10px 12px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.35;
  color: rgba(255,255,255,.92);
  border: 1px solid rgba(255,255,255,.18);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

#controls { display:none !important; }
#hint { display:none !important; }


/* PC zoom support */
body.pc-zoom-active #viewer {
  overflow: hidden;
}
body.pc-zoom-active #stageShell {
  cursor: grab;
}
body.pc-zoom-active.dragging #stageShell {
  cursor: grabbing;
}

<script>
(() => {
  const root = document.documentElement;
  const viewer = document.getElementById('viewer');
  const shell = document.getElementById('stageShell');
  const stage = document.getElementById('stage');
  const btnIn = document.getElementById('zoomIn');
  const btnOut = document.getElementById('zoomOut');
  const btnReset = document.getElementById('zoomReset');
  const btnTourb = document.getElementById('zoomTourb');
  const STAGE_W = 3784;
  const STAGE_H = 2838;
  const TOURB_X = 1697;
  const TOURB_Y = 1780;
  let autoFitScale = 1;
  let zoomFactor = 1;

  function getSafe() {
    const cs = getComputedStyle(root);
    return {
      top: parseFloat(cs.getPropertyValue('--safe-top')) || 0,
      right: parseFloat(cs.getPropertyValue('--safe-right')) || 0,
      bottom: parseFloat(cs.getPropertyValue('--safe-bottom')) || 0,
      left: parseFloat(cs.getPropertyValue('--safe-left')) || 0,
    };
  }

  function computeAutoFit() {
    const safe = getSafe();
    const availW = Math.max(1, window.innerWidth - safe.left - safe.right);
    const availH = Math.max(1, window.innerHeight - safe.top - safe.bottom);
    autoFitScale = Math.min(availW / STAGE_W, availH / STAGE_H);
    if (zoomFactor < 1) zoomFactor = 1;
  }

  function applyScale() {
    const desktopLike = !(window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
    const desktopFitFactor = desktopLike ? 0.88 : 1;
    const totalScale = autoFitScale * zoomFactor * desktopFitFactor;
    shell.style.width = `${Math.round(STAGE_W * totalScale)}px`;
    shell.style.height = `${Math.round(STAGE_H * totalScale)}px`;
    stage.style.transform = `scale(${totalScale})`;
    root.style.setProperty('--stage-scale', String(totalScale));
    if (zoomFactor > 1.001) {
      viewer.classList.add('zoom-mode');
    } else {
      viewer.classList.remove('zoom-mode');
      viewer.scrollLeft = 0;
      viewer.scrollTop = 0;
    }
  }

  function fit() {
    computeAutoFit();
    applyScale();
  }

  function centerOnStagePoint(x, y) {
    if (zoomFactor <= 1.001) return;
    const scale = autoFitScale * zoomFactor;
    const safe = getSafe();
    const viewportW = window.innerWidth - safe.left - safe.right;
    const viewportH = window.innerHeight - safe.top - safe.bottom;
    const targetLeft = Math.max(0, x * scale - viewportW / 2);
    const targetTop = Math.max(0, y * scale - viewportH / 2);
    viewer.scrollLeft = targetLeft;
    viewer.scrollTop = targetTop;
  }

  function setZoomFactor(nextFactor, centerTourb=false) {
    zoomFactor = Math.max(1, Math.min(4, nextFactor));
    applyScale();
    if (centerTourb) centerOnStagePoint(TOURB_X, TOURB_Y);
  }

  btnIn.addEventListener('click', () => setZoomFactor(zoomFactor * 1.25, true));
  btnOut.addEventListener('click', () => setZoomFactor(zoomFactor / 1.25, true));
  btnReset.addEventListener('click', () => setZoomFactor(1, false));
  btnTourb.addEventListener('click', () => {
    if (zoomFactor <= 1.001) zoomFactor = 2;
    applyScale();
    centerOnStagePoint(TOURB_X, TOURB_Y);
  });

  let lastTap = 0;
  viewer.addEventListener('pointerup', (e) => {
    const now = Date.now();
    if (now - lastTap < 280) {
      if (zoomFactor <= 1.001) setZoomFactor(2, true);
    }
    lastTap = now;
  });

  window.addEventListener('resize', fit, { passive: true });
  window.addEventListener('orientationchange', fit, { passive: true });
  fit();
})();
</script>
<script>
(() => {
  const els = {
    cage: document.getElementById('tourb_cage'),
    balance: document.getElementById('balance'),
    pinion1: document.getElementById('pinion1'),
    pinion2: document.getElementById('pinion2'),
    secWheel: document.getElementById('sec_wheel2'),
    moon: document.getElementById('moon'),
    gmtLeft: document.getElementById('gmt_l'),
    gmtRight: document.getElementById('gmt_r')
  };

  const pivot = {
    cage: { x: 223, y: 246 },
    balance: { x: 218, y: 206 },
    pinion1: { x: 102, y: 111 },
    pinion2: { x: 126, y: 71 },
    secWheel: { x: 177, y: 167 },
    moon: { x: 76, y: 159 },
    gmtLeft: { x: 22, y: 110 },
    gmtRight: { x: 22, y: 110 }
  };

  for (const [key, el] of Object.entries(els)) {
    el.style.transformOrigin = `${pivot[key].x}px ${pivot[key].y}px`;
  }

  const PERIOD_BALANCE_MS = 500;
  const PERIOD_PINION2_MS = 333;
  const SEC_REVOLUTION_MS = 60000;
  const MOON_HALF_CYCLE_MS = 60000; // TEST MODE: 180° in 60 seconds // 180° per full moon cycle test

  // Global master center Z6
  const Z6 = { x: 1697, y: 1780 };

  const Z5 = { x: 2083, y: 1778 };
  const Z7 = { x: 1285, y: 1767 };

  // =========================
  // GMT feste Ziel-Zeitzonen
  // links = Schweiz / rechts = Tokio
  // Push-Buttons verschieben relativ dazu
  // =========================
  let offsetLeft = 0;
  let offsetRight = 0;

  const hitGMTMinus = document.getElementById('hit_gmt_minus');
  const hitGMTPlus = document.getElementById('hit_gmt_plus');

  function bindTapAction(el, action) {
    if (!el) return;
    let touchHandled = false;

    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
    }, { passive: false });

    el.addEventListener('touchend', (e) => {
      e.preventDefault();
      e.stopPropagation();
      touchHandled = true;
      action();
      setTimeout(() => { touchHandled = false; }, 0);
    }, { passive: false });

    el.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
    }, { passive: true });

    el.addEventListener('pointerup', (e) => {
      e.stopPropagation();
    }, { passive: true });

    el.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (touchHandled) return;
      action();
    }, { passive: false });
  }

  bindTapAction(hitGMTMinus, () => {
    playClickSoft();
    offsetLeft -= 1;
  });

  bindTapAction(hitGMTPlus, () => {
    playClickHeavy();
    offsetRight += 1;
  });

  function getTimeParts(timeZone) {
    const parts = new Intl.DateTimeFormat('en-GB', {
      timeZone,
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hourCycle: 'h23'
    }).formatToParts(new Date());

    const get = (type) => Number(parts.find(p => p.type === type).value);
    return {
      hour: get('hour'),
      minute: get('minute'),
      second: get('second')
    };
  }


  // Current global pivot positions from the stable layout:
  // pinion1 = left 1495 + pivotX 102 = 1597 / top 1575 + pivotY 111 = 1686
  // pinion2 = left 1459 + pivotX 126 = 1585 / top 1717 + pivotY  71 = 1788
  // These offsets are now rotated around Z6 in true seconds takt.
  const orbit1 = { x: 1597 - Z6.x, y: 1686 - Z6.y };
  const orbit2 = { x: 1585 - Z6.x, y: 1788 - Z6.y };

  function rotatePointCW(vx, vy, deg) {
    const r = deg * Math.PI / 180;
    const c = Math.cos(r);
    const s = Math.sin(r);
    return {
      x: vx * c - vy * s,
      y: vx * s + vy * c
    };
  }

  function setElementPivotAt(el, globalX, globalY, piv) {
    el.style.left = `${globalX - piv.x}px`;
    el.style.top = `${globalY - piv.y}px`;
  }

  function animate() {
    const now = Date.now();

    // Browser local system time driven motion
    const msWithinMinute = now % SEC_REVOLUTION_MS;

    // L02 Moon disc: double-moon disc, 180° per full moon cycle
    
    const MOON_CYCLE_DAYS = 29.530588;
    const DEG_PER_DAY = 180 / MOON_CYCLE_DAYS;

    const KNOWN_NEW_MOON = Date.UTC(2024, 1, 10, 23, 59, 0);

    const daysElapsed = (Date.now() - KNOWN_NEW_MOON) / (1000 * 60 * 60 * 24);
    const cycleDay = ((daysElapsed % MOON_CYCLE_DAYS) + MOON_CYCLE_DAYS) % MOON_CYCLE_DAYS;

    const moonAngle = cycleDay * DEG_PER_DAY;



    const zurich = getTimeParts('Europe/Zurich');
    const tokyo = getTimeParts('Asia/Tokyo');

    const zurich24 = zurich.hour
      + zurich.minute / 60
      + zurich.second / 3600
      + offsetLeft;

    const tokyo24 = tokyo.hour
      + tokyo.minute / 60
      + tokyo.second / 3600
      + offsetRight;

    const gmtDialOffset = 90;
    const gmtLeftAngle = (((((zurich24 % 24) + 24) % 24) * 15) + gmtDialOffset) % 360;
    const gmtRightAngle = (((((tokyo24 % 24) + 24) % 24) * 15) + gmtDialOffset) % 360;

    // L08 Tourbillon cage: continuous 360° / 60 s
    const cageAngle = (msWithinMinute / SEC_REVOLUTION_MS) * 360;

    // L07 Balance: pendular / harmonic oscillation approx. ±45°
    const balanceAngle = 45 * Math.sin((2 * Math.PI * now) / PERIOD_BALANCE_MS);

    // L04 Rear seconds wheel: continuous rotation 360° / 60 s (CW)
    const secWheelAngle = (msWithinMinute / SEC_REVOLUTION_MS) * 360;

    // L06/L05 Tourbillon sync: pinion1 steps exactly with hammer cycle
    const p1 = rotatePointCW(orbit1.x, orbit1.y, secWheelAngle);
    setElementPivotAt(els.pinion1, Z6.x + p1.x, Z6.y + p1.y, pivot.pinion1);

    const p2 = rotatePointCW(orbit2.x, orbit2.y, secWheelAngle);
    setElementPivotAt(els.pinion2, Z6.x + p2.x, Z6.y + p2.y, pivot.pinion2);

    const PINION1_SPEED_DEG_PER_SEC = 67.6;

    // Hammer phase 0..1
    const hammerCycle = (now % PERIOD_PINION2_MS) / PERIOD_PINION2_MS;

    // Short brake window near hammer contact
    let brake = 1.0;
    if (hammerCycle > 0.72) {
      const t = (hammerCycle - 0.72) / (1.0 - 0.72);
      brake = 1.0 - Math.sin(t * Math.PI * 0.5) * 0.85;
    }

    if (typeof animate._pinion1Phase === 'undefined') {
      animate._pinion1Phase = 0;
      animate._lastNow = now;
    }

    const dt = (now - animate._lastNow) / 1000;
    animate._lastNow = now;

    animate._pinion1Phase += PINION1_SPEED_DEG_PER_SEC * brake * dt;

    const pinion1Angle = secWheelAngle + animate._pinion1Phase;

    const pinion2Hammer = 18 * Math.sin((2 * Math.PI * now) / PERIOD_PINION2_MS);
    const pinion2Angle = secWheelAngle + pinion2Hammer;

    if (els.moon) els.moon.style.transform = `rotate(${moonAngle}deg)`;
    if (els.gmtLeft) els.gmtLeft.style.transform = `rotate(${gmtLeftAngle}deg)`;
    if (els.gmtRight) els.gmtRight.style.transform = `rotate(${gmtRightAngle}deg)`;
    els.cage.style.transform = `rotate(${cageAngle}deg)`;
    els.balance.style.transform = `rotate(${balanceAngle}deg)`;
    els.pinion1.style.transform = `rotate(${pinion1Angle}deg)`;
    els.pinion2.style.transform = `rotate(${pinion2Angle}deg)`;
    els.secWheel.style.transform = `rotate(${secWheelAngle}deg)`;

    requestAnimationFrame(animate);
  }

  animate();
})();
</script>
<script>
(function () {
  const viewer = document.getElementById('viewer');
  const stageShell = document.getElementById('stageShell');
  const stage = document.getElementById('stage');
  if (!viewer || !stageShell || !stage) return;

  const isTouchLike = () => ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (isTouchLike()) return; // leave iPhone/iPad touch behavior unchanged

  let fitScale = 1;
  let zoomScale = 1;
  let panX = 0;
  let panY = 0;
  let isDragging = false;
  let startX = 0;
  let startY = 0;
  let moved = false;

  function clamp(v, min, max) {
    return Math.min(max, Math.max(min, v));
  }

  function computeFitScale() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const sw = stage.offsetWidth;
    const sh = stage.offsetHeight;
    fitScale = Math.min(vw / sw, vh / sh);
    if (!isFinite(fitScale) || fitScale <= 0) fitScale = 1;
  }

  function applyPCZoom() {
    document.body.classList.add('pc-zoom-active');
    const totalScale = fitScale * zoomScale;
    stageShell.style.transformOrigin = 'center center';
    stageShell.style.transform = `translate(${panX}px, ${panY}px) scale(${totalScale})`;
  }

  function resetView() {
    zoomScale = 1;
    panX = 0;
    panY = 0;
    applyPCZoom();
  }

  function zoomAt(clientX, clientY, factor) {
    const rect = viewer.getBoundingClientRect();
    const cx = clientX - rect.left - rect.width / 2;
    const cy = clientY - rect.top - rect.height / 2;

    const oldScale = fitScale * zoomScale;
    const newZoom = clamp(zoomScale * factor, 1, 6);
    const newScale = fitScale * newZoom;
    const scaleRatio = newScale / oldScale;

    panX = cx - (cx - panX) * scaleRatio;
    panY = cy - (cy - panY) * scaleRatio;
    zoomScale = newZoom;
    applyPCZoom();
  }

  function recenterIfNeeded() {
    if (zoomScale <= 1.001) {
      panX = 0;
      panY = 0;
    }
  }

  computeFitScale();
  applyPCZoom();

  window.addEventListener('resize', () => {
    computeFitScale();
    recenterIfNeeded();
    applyPCZoom();
  });

  viewer.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    zoomAt(e.clientX, e.clientY, factor);
  }, { passive: false });

  stageShell.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    if (zoomScale <= 1.001) return;
    isDragging = true;
    moved = false;
    startX = e.clientX - panX;
    startY = e.clientY - panY;
    document.body.classList.add('dragging');
    e.preventDefault();
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const nextX = e.clientX - startX;
    const nextY = e.clientY - startY;
    if (Math.abs(nextX - panX) > 1 || Math.abs(nextY - panY) > 1) moved = true;
    panX = nextX;
    panY = nextY;
    applyPCZoom();
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
    document.body.classList.remove('dragging');
  });

  stageShell.addEventListener('dblclick', (e) => {
    e.preventDefault();
    resetView();
  });

  // Prevent image ghost dragging on desktop
  stageShell.querySelectorAll('img').forEach(img => {
    img.setAttribute('draggable', 'false');
  });
})();

<script>
(function(){
  const shieldButton = (el) => {
    if (!el) return;

    // Keep button taps from reaching viewer/stage handlers,
    // but do NOT cancel the button's own click behavior.
    const stopBubble = (e) => {
      e.stopPropagation();
    };

    el.addEventListener('pointerdown', stopBubble, { passive: true });
    el.addEventListener('pointerup', stopBubble, { passive: true });
    el.addEventListener('click', stopBubble, { passive: true });
    el.addEventListener('touchstart', stopBubble, { passive: true });
    el.addEventListener('touchend', stopBubble, { passive: true });
    el.addEventListener('dblclick', stopBubble, { passive: true });
  };

  document.querySelectorAll('.hit-zone, #soundButton, #btnSound, #btnInfo, #btnFit').forEach(shieldButton);

  // Extra iPhone double-tap zoom blocker for the page background,
  // but avoid interfering with button taps.
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function(e){
    if (e.target && e.target.closest('.hit-zone, #soundButton, #btnSound, #btnInfo, #btnFit')) {
      lastTouchEnd = Date.now();
      return;
    }
    const now = Date.now();
    if (now - lastTouchEnd < 300) {
      e.preventDefault();
    }
    lastTouchEnd = now;
  }, { passive: false });
})();
</script>

<script>
(function(){
  const hourEl = document.getElementById('hourHand');
  const minuteEl = document.getElementById('minuteHand');
  if (!hourEl || !minuteEl) return;

  function updateHands(){
    const now = new Date();
    const seconds = now.getSeconds() + now.getMilliseconds()/1000;
    const minutes = now.getMinutes() + seconds/60;
    const hours = (now.getHours()%12) + minutes/60;

    minuteEl.style.transform = 'rotate(' + (minutes * 6) + 'deg)';
    hourEl.style.transform = 'rotate(' + (hours * 30) + 'deg)';
  }

  updateHands();
  setInterval(updateHands, 33);
})();
</script>

<script>
(function(){
  const h24 = document.getElementById('h24');
  const leap = document.getElementById('leap');
  if(!h24 || !leap) return;

  function getLeapIndex(year){
    const mod = ((year % 4) + 4) % 4;
    return mod;
  }

  function updateSubdials(){
    const now = new Date();

    const h = now.getHours();
    const m = now.getMinutes();
    const s = now.getSeconds();
    const ms = now.getMilliseconds();

    const day24 = h + (m / 60) + (s / 3600) + (ms / 3600000);
    const deg24 = (day24 / 24) * 360;

    const leapIndex = getLeapIndex(now.getFullYear());
    const degLeap = (leapIndex * 90) - 45;

    h24.style.transform = `rotate(${deg24}deg)`;
    leap.style.transform = `rotate(${degLeap}deg)`;
  }

  updateSubdials();
  setInterval(updateSubdials, 1000/12);
})();
</script>


<script>
(function(){
  const tickAudio = document.getElementById('tickAudio');
  const soundButton = document.getElementById('soundButton');
  if (!tickAudio || !soundButton) return;

  let tickEnabled = false;

  function updateSoundButton(){
    soundButton.textContent = tickEnabled ? 'Sound Stop' : 'Sound';
  }

  async function startTick(){
    try {
      tickAudio.loop = true;
      tickAudio.volume = 0.35;
      try { tickAudio.currentTime = 0; } catch (e) {}
      await tickAudio.play();
      tickEnabled = true;
      updateSoundButton();
    } catch (err) {
      console.warn('Tick start failed:', err);
    }
  }

  function stopTick(){
    tickAudio.pause();
    try { tickAudio.currentTime = 0; } catch (e) {}
    tickEnabled = false;
    updateSoundButton();
  }

  async function toggleTick(ev){
    if (ev) {
      ev.preventDefault();
      ev.stopPropagation();
    }
    if (tickEnabled) stopTick();
    else await startTick();
  }

  updateSoundButton();
  soundButton.addEventListener('click', toggleTick);
  soundButton.addEventListener('touchend', toggleTick, { passive:false });
})();
</script>

<script>
(function(){
  const dingdongCycle = 2000;
  const dongCycle = 1100;
  const chimeDuration = 5700;
  const chimePause = 0;

  let sonnerieRunToken = 0;
  window.__strikeSilence = window.__strikeSilence || false;
  window.__sonnerieMode = window.__sonnerieMode || 'grande';
  let lastMinuteChecked = new Date().getMinutes();
  let chimeArmed = false;

  const clockChimeSrc  = document.getElementById('clockChimeSrc')?.src || '';
  const clockDingSrc   = document.getElementById('clockDingSrc')?.src || '';
  const clockDongSrc   = document.getElementById('clockDongSrc')?.src || '';

  const dingPool = [];
  const dongPool = [];
  const chimePool = [];
  let di = 0, doI = 0, ci = 0;

  function make(src) {
    const a = new Audio(src);
    a.preload = 'auto';
    a.playsInline = true;
    return a;
  }

  async function warm(a) {
    try {
      a.volume = 0.01;
      const p = a.play();
      if (p && typeof p.then === 'function') {
        await p.catch(() => {});
      }
      await new Promise(r => setTimeout(r, 80));
      a.pause();
      try { a.currentTime = 0; } catch (e) {}
      a.volume = 1;
    } catch (e) {}
  }

  function next(pool, type) {
    if (type === 'ding') {
      const i = di; di = (di + 1) % pool.length; return pool[i];
    }
    if (type === 'dong') {
      const i = doI; doI = (doI + 1) % pool.length; return pool[i];
    }
    const i = ci; ci = (ci + 1) % pool.length; return pool[i];
  }

  async function arm() {
    if (chimeArmed) return;
    chimeArmed = true;

    for (let i = 0; i < 4; i++) dingPool.push(make(clockDingSrc));
    for (let i = 0; i < 12; i++) dongPool.push(make(clockDongSrc));
    for (let i = 0; i < 2; i++) chimePool.push(make(clockChimeSrc));

    for (const a of [...dingPool, ...dongPool, ...chimePool]) {
      await warm(a);
    }

    startLoop();
  }

  document.addEventListener('pointerdown', arm, { once: true });
  document.addEventListener('touchstart', arm, { once: true });
  document.addEventListener('click', arm, { once: true });

  async function play(a) {
    try {
      a.pause();
      a.currentTime = 0;
      const p = a.play();
      if (p && typeof p.then === 'function') {
        await p.catch(() => {});
      }
    } catch (e) {}
  }

  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  function h12(h) {
    return ((h + 11) % 12) + 1;
  }

  async function playDingdongCount(n, token) {
    if (window.__strikeSilence) return;
    for (let i = 0; i < n; i++) {
      if (token !== sonnerieRunToken) return;
      if (typeof window.__consumeSonnerieReserve === 'function') window.__consumeSonnerieReserve('dingdong', 1);
      playDingdongOnce();
      await sleep(dingdongCycle);
    }
  }

  async function playQuarter(n, token) {
    if (window.__strikeSilence) return;
    for (let i = 0; i < n; i++) {
      if (token !== sonnerieRunToken) return;
      if (typeof window.__consumeSonnerieReserve === 'function') window.__consumeSonnerieReserve('dingdong', 1);
      await play(next(dingPool, 'ding'));
      if (i < n - 1) await sleep(dingdongCycle);
    }
  }

  async function playHour(h, token) {
    if (window.__strikeSilence) return;
    if (typeof window.__consumeSonnerieReserve === 'function') window.__consumeSonnerieReserve('chime', 1);
    await play(next(chimePool, 'chime'));
    await sleep(chimeDuration + chimePause);

    if (token !== sonnerieRunToken) return;

    const count = h12(h);
    for (let i = 0; i < count; i++) {
      if (token !== sonnerieRunToken) return;
      if (typeof window.__consumeSonnerieReserve === 'function') window.__consumeSonnerieReserve('dong', 1);
      await play(next(dongPool, 'dong'));
      if (i < count - 1) await sleep(dongCycle);
    }
  }

  function check() {
    if (window.__strikeSilence) return;
    const now = new Date();
    const m = now.getMinutes();
    const h = now.getHours();

    if (m === lastMinuteChecked) return;

    const prev = lastMinuteChecked;
    lastMinuteChecked = m;

    function crossed(t) {
      if (prev < m) return t > prev && t <= m;
      return t > prev || t <= m;
    }

    const token = ++sonnerieRunToken;

    if (crossed(0)) playHour(h, token);
    else if (crossed(15)) playQuarter(1, token);
    else if (crossed(30)) playQuarter(2, token);
    else if (crossed(45)) playQuarter(3, token);
  }


  function stopAutoNow() {
    sonnerieRunToken++;
    for (const a of [...dingPool, ...dongPool, ...chimePool]) {
      try { a.pause(); a.currentTime = 0; } catch (e) {}
    }
  }

  window.__stopAutoChimeNow = stopAutoNow;
  window.__setStrikeSilence = function(v){
    window.__strikeSilence = !!v;
    if (window.__strikeSilence) stopAutoNow();
  };


  window.__setSonnerieMode = function(mode){
    window.__sonnerieMode = (mode === 'petite') ? 'petite' : 'grande';
  };

  function startLoop() {
    function loop() {
      if (!chimeArmed) return;
      check();
      requestAnimationFrame(loop);
    }
    loop();
  }
})();
</script>


<script>
(function(){
  const viewer = document.getElementById('viewer');
  const stageShell = document.getElementById('stageShell');
  const stage = document.getElementById('stage');
  if (!viewer || !stageShell || !stage) return;

  const stageW = 3784;
  const stageH = 2838;

  function isTouchLike(){
    return ('ontouchstart' in window) || (navigator.maxTouchPoints || 0) > 0;
  }

  function applyPcFit(){
    if (isTouchLike()) return; // leave phones/tablets alone

    // Neutralize any old zoom-mode / drag-fit assumptions on desktop start
    document.body.classList.remove('pc-zoom-active', 'dragging');
    viewer.classList.remove('zoom-mode');

    const vw = viewer.clientWidth || window.innerWidth;
    const vh = viewer.clientHeight || window.innerHeight;

    // Stable single fit factor with a gentle desktop boost
    const fit = Math.min(vw / stageW, vh / stageH);
    const desktopBoost = 1.18;
    const scale = fit * desktopBoost;

    stageShell.style.width = stageW + 'px';
    stageShell.style.height = stageH + 'px';
    stageShell.style.transformOrigin = 'center center';
    stageShell.style.transform = 'scale(' + scale + ')';

    // Keep stage itself unscaled internally
    stage.style.transform = '';
  }

  window.addEventListener('resize', applyPcFit, {passive:true});
  window.addEventListener('orientationchange', applyPcFit, {passive:true});
  document.addEventListener('DOMContentLoaded', applyPcFit);
  setTimeout(applyPcFit, 50);
  setTimeout(applyPcFit, 250);
})();
</script>

<script>
(function(){
  const dongSrc = document.getElementById('clockDongSrc');
  const dingdongSrc = document.getElementById('clockDingSrc');
  const minuteSrc = document.getElementById('clockMinuteSrc');
  if(!dongSrc || !dingdongSrc || !minuteSrc) return;

  let lastHandledSeq = 0;
  let lastStartTime = 0;
  let repeaterToken = 0;
  let isRunning = false;
  let warmed = false;

  const dongPool = [];
  const dingdongPool = [];
  const minutePool = [];

  function buildPool(src, count, arr){
    for(let i=0;i<count;i++){
      const a = new Audio(src);
      a.preload = 'auto';
      a.playsInline = true;
      arr.push(a);
    }
  }

  buildPool(dongSrc.src, 14, dongPool);
  buildPool(dingdongSrc.src, 4, dingdongPool);
  buildPool(minuteSrc.src, 16, minutePool);

  function pick(arr){
    for(const a of arr){
      if(a.paused || a.ended) return a;
    }
    return arr[0];
  }

  function play(arr){
    const a = pick(arr);
    if(!a) return;
    try{
      a.pause();
      a.currentTime = 0;
      a.volume = 1;
      const p = a.play();
      if(p && p.catch) p.catch(()=>{});
    }catch(e){}
  }

  function warmPool(pool){
    pool.forEach(a=>{
      try{
        a.currentTime = 0;
        a.volume = 0.01;
        const p = a.play();
        if(p && p.catch) p.catch(()=>{});
        setTimeout(()=>{
          try{
            a.pause();
            a.currentTime = 0;
            a.volume = 1;
          }catch(e){}
        }, 20);
      }catch(e){}
    });
  }

  function arm(){
    if(warmed) return;
    warmed = true;
    warmPool(dongPool);
    warmPool(dingdongPool);
    warmPool(minutePool);
  }

  function startRepeater(token){
    const d = new Date();
    const hour12  = (d.getHours() % 12) || 12;
    const minute  = d.getMinutes();
    const quarters = Math.floor(minute / 15);
    const minutes  = minute % 15;

    let delay = 120;
    const DONG_CYCLE = 1350;
    const DINGDONG_CYCLE = 2000;
    const MINUTE_CYCLE = 1000;

    for(let i=0;i<hour12;i++){
      const t = delay;
      setTimeout(()=>{
        if(token !== repeaterToken) return;
        if (typeof window.__consumeSonnerieReserve === 'function') window.__consumeSonnerieReserve('dong', 1);
        play(dongPool);
      }, t);
      delay += DONG_CYCLE;
    }

    for(let i=0;i<quarters;i++){
      const t = delay;
      setTimeout(()=>{
        if(token !== repeaterToken) return;
        if (typeof window.__consumeSonnerieReserve === 'function') window.__consumeSonnerieReserve('dingdong', 1);
        play(dingdongPool);
      }, t);
      delay += DINGDONG_CYCLE;
    }

    for(let i=0;i<minutes;i++){
      const t = delay;
      setTimeout(()=>{
        if(token !== repeaterToken) return;
        if (typeof window.__consumeSonnerieReserve === 'function') window.__consumeSonnerieReserve('ding', 1);
        play(minutePool);
      }, t);
      delay += MINUTE_CYCLE;
    }

    setTimeout(()=>{
      if(token === repeaterToken){
        isRunning = false;
      }
    }, delay + 50);
  }

  function handlePress(seq){
    if (window.__strikeSilence) return;
    if(!seq || seq === lastHandledSeq) return;
    lastHandledSeq = seq;

    const now = Date.now();

    // While running: ignore further presses completely
    if(isRunning){
      return;
    }

    lastStartTime = now;

    repeaterToken++;
    const token = repeaterToken;

    arm();
    isRunning = true;

    setTimeout(()=>{
      startRepeater(token);
    }, 30);
  }

  function stopMinuteRepeater(){
    repeaterToken++;
    isRunning = false;
    [dongPool, dingdongPool, minutePool].forEach(function(pool){
      pool.forEach(function(a){
        try { a.pause(); a.currentTime = 0; } catch(e) {}
      });
    });
  }

  window.__stopMinuteRepeaterNow = stopMinuteRepeater;

  window.addEventListener('z19-press', function(ev){
    const seq = ev && ev.detail ? ev.detail.seq : 0;
    handlePress(seq);
  });
})();
</script>

<script>
(function(){
  const src = document.getElementById('topClickSrc');
  if(!src) return;

  const pool = [];
  for(let i=0;i<3;i++){
    const a = new Audio(src.src);
    a.preload = 'auto';
    a.playsInline = true;
    pool.push(a);
  }

  let armed = false;

  function armOnce(){
    if(armed) return;
    armed = true;
    pool.forEach(a=>{
      try{
        a.volume = 0.01;
        const p = a.play();
        if(p && p.catch) p.catch(()=>{});
        setTimeout(()=>{
          try{
            a.pause();
            a.currentTime = 0;
            a.volume = 1;
          }catch(e){}
        }, 20);
      }catch(e){}
    });
  }

  window.__playTopClick = function(){
    armOnce();
    const a = pool.find(x => x.paused || x.ended) || pool[0];
    try{
      a.pause();
      a.currentTime = 0;
      a.volume = 1;
      const p = a.play();
      if(p && p.catch) p.catch(()=>{});
    }catch(e){}
  };
})();
</script>

})();

<script>
(function(){
  const tickAudio = document.getElementById('tickAudio');
  if(!tickAudio) return;

  let started = false;

  function ensureTickStart(){
    if(started) return;
    started = true;
    try{
      tickAudio.loop = true;
      tickAudio.volume = 0.35;
      try{
        if(tickAudio.paused) tickAudio.currentTime = 0;
      }catch(e){}
      const p = tickAudio.play();
      if(p && p.catch){
        p.catch(()=>{ started = false; });
      }
    }catch(e){
      started = false;
    }
  }

  // Any first normal touch on the page can unlock/start tick
  document.addEventListener('touchstart', ensureTickStart, { passive:true, capture:true });
  document.addEventListener('pointerdown', ensureTickStart, { passive:true, capture:true });
  document.addEventListener('click', ensureTickStart, { passive:true, capture:true });

  // Extra safety for the two lower buttons so their click sounds can work again
  ['hit_gmt_minus','hit_gmt_plus'].forEach(function(id){
    const btn = document.getElementById(id);
    if(!btn) return;
    btn.addEventListener('touchstart', ensureTickStart, { passive:true, capture:true });
    btn.addEventListener('pointerdown', ensureTickStart, { passive:true, capture:true });
    btn.addEventListener('click', ensureTickStart, { passive:true, capture:true });
  });
})();
</script>


<script>
(function(){
  const reSo = document.getElementById('L17'); // left = sonnerie reserve
  const reMo = document.getElementById('L16'); // right = movement reserve
  if(!reSo || !reMo) return;

  // ===== User-defined angle system =====
  // Movement reserve (right / Z3) counterclockwise linear
  const MOV_EMPTY = 326.2;
  const MOV_FULL  = 173.4;
  const MOV_START = 251.9;

  // Sonnerie reserve (left / Z13) clockwise linear
  const SON_EMPTY = 37.3;
  const SON_FULL  = 187.1;
  const SON_START = 109.0;

  // ===== Reserve models =====
  // Movement reserve: 48 h from full to empty
  const MOVEMENT_RUNTIME_SECONDS = 48 * 60 * 60;

  // Sonnerie reserve: weighted by actual played tones
  const SONNERIE_CAPACITY = 300.0;
  const COST = {
    chime: 8.0,
    dong: 1.0,
    dingdong: 2.0,
    ding: 1.0
  };

  function clamp(v, min, max){
    return Math.max(min, Math.min(max, v));
  }

  function normalizeDeg(deg){
    let d = deg % 360;
    if (d < 0) d += 360;
    return d;
  }

  function fracFromLinearAngle(angle, empty, full){
    return clamp((angle - empty) / (full - empty), 0, 1);
  }

  function fracFromCCWAngle(angle, empty, full){
    // angle decreases from empty -> full
    const span = empty - full;
    return clamp((empty - angle) / span, 0, 1);
  }

  function angleFromLinearFrac(frac, empty, full){
    return empty + frac * (full - empty);
  }

  function angleFromCCWFrac(frac, empty, full){
    return empty - frac * (empty - full);
  }

  const state = {
    movementFrac: fracFromCCWAngle(MOV_START, MOV_EMPTY, MOV_FULL),
    sonnerieUnits: SONNERIE_CAPACITY * fracFromLinearAngle(SON_START, SON_EMPTY, SON_FULL),
    lastTs: performance.now()
  };

  function applyHands(){
    const movAngle = angleFromCCWFrac(state.movementFrac, MOV_EMPTY, MOV_FULL);
    const sonFrac = clamp(state.sonnerieUnits / SONNERIE_CAPACITY, 0, 1);
    const sonAngle = angleFromLinearFrac(sonFrac, SON_EMPTY, SON_FULL);

    reMo.style.transform = 'rotate(' + movAngle.toFixed(3) + 'deg)';
    reSo.style.transform = 'rotate(' + normalizeDeg(sonAngle).toFixed(3) + 'deg)';
  }

  // Initial positions
  reMo.style.transition = 'transform 220ms ease';
  reSo.style.transition = 'transform 220ms ease';
  applyHands();

  // ===== Public consumption hook =====
  window.__consumeSonnerieReserve = function(kind, count){
    const n = Number(count || 1);
    const cost = (COST[kind] || 0) * n;
    if (!cost) return;
    state.sonnerieUnits = clamp(state.sonnerieUnits - cost, 0, SONNERIE_CAPACITY);
    applyHands();
  };

  // ===== Hook automatic sonnerie =====
  if (typeof window.__setStrikeSilence === 'function' && !window.__reserveHookedAuto) {
    window.__reserveHookedAuto = true;
    // Wrap playHour/playQuarter via monkey patching on audio play calls is messy.
    // Instead patch the known helper functions if they exist in global scope later via microtask.
    setTimeout(function(){
      try {
        if (window.playDingdongOnce && !window.__wrappedPlayDingdongOnce){
          const orig = window.playDingdongOnce;
          window.playDingdongOnce = function(){
            window.__consumeSonnerieReserve('dingdong', 1);
            return orig.apply(this, arguments);
          };
          window.__wrappedPlayDingdongOnce = true;
        }
      } catch(e){}
    }, 0);
  }

  // ===== Repeater reserve hooks =====
  // Hook the explicit repeater scheduling block through a lightweight wrapper
  if (!window.__reserveRepeaterHookInstalled) {
    window.__reserveRepeaterHookInstalled = true;
    const _setTimeout = window.setTimeout;
    // We only count the actual scheduled callbacks created after this script if they call the named pools.
    // Easier: expose helper used by patched audio scripts below.
    window.__reserveCount = function(kind){ window.__consumeSonnerieReserve(kind, 1); };
  }

  // Movement reserve drains slowly with real browser-open runtime
  function loop(ts){
    const dt = Math.max(0, (ts - state.lastTs) / 1000);
    state.lastTs = ts;

    state.movementFrac = clamp(state.movementFrac - (dt / MOVEMENT_RUNTIME_SECONDS), 0, 1);
    applyHands();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>

<script>
/* =========================================================
   CHRONOGRAPH SYSTEM V1.51
   ---------------------------------------------------------
   Prepared and wired:
   - L27 = chrono central seconds (main)
   - L26 = chrono central split-seconds (prepared, follows main until split button exists)
   - L22 = chrono 30-minute counter
   - L21 = chrono 12-hour retrograde counter
   - Z14 = start / stop
   - Z15 = flyback
========================================================= */
(function(){
  const secMain  = document.getElementById('L27');
  const secSplit = document.getElementById('L26');
  const minHand  = document.getElementById('L22');
  const hourHand = document.getElementById('L21');
  const btnStart = document.getElementById('HIT_Z14');
  const btnFly   = document.getElementById('HIT_Z15');

  if(!secMain || !secSplit || !minHand || !hourHand) return;

  /* ======= calibrated hour retrograde values ======= */
  const HOUR_START_DEG = -112.5;   // 0 hours
  const HOUR_END_DEG   = -245.5;   // 12 hours
  const HOUR_MAX       = 12;
  const HOUR_SNAP_MS   = 260;

  /* ======= chrono scale values ======= */
  const SEC_REV_MS = 60 * 1000;           // 60 s / revolution
  const MIN_REV_MS = 30 * 60 * 1000;      // 30 min / revolution
  const SPLIT_VISIBLE_OFFSET_DEG = 0.8;   // tiny visibility helper while frozen
  const SPLIT_CATCHUP_MS = 320;           // smoother mechanical catch-up

  /* ======= state ======= */
  const state = {
    running: false,
    startMs: 0,
    storedMs: 0,

    splitFrozen: false,
    splitFrozenMs: 0,
    splitCatchupActive: false,
    splitCatchupStartMs: 0,
    splitCatchupFromDeg: 0,

    hourSnapActive: false,
    hourSnapStartMs: 0,
    hourSnapFromDeg: HOUR_START_DEG,
    restartAfterSnap: false
  };

  function clamp(v, min, max){
    return Math.max(min, Math.min(max, v));
  }

  function nowMs(){
    return performance.now();
  }

  function getElapsedMs(){
    return state.running ? (state.storedMs + (nowMs() - state.startMs)) : state.storedMs;
  }

  function setAngle(el, deg){
    el.style.transform = 'rotate(' + deg + 'deg)';
  }

  function hourAngleFromElapsed(elapsedMs){
    const hoursFloat = (elapsedMs / 3600000) % HOUR_MAX;
    const frac = clamp(hoursFloat / HOUR_MAX, 0, 1);
    return HOUR_START_DEG + (HOUR_END_DEG - HOUR_START_DEG) * frac;
  }

  function startChrono(){
    if(state.running) return;
    state.running = true;
    state.startMs = nowMs();
  }

  function stopChrono(){
    if(!state.running) return;
    state.storedMs = getElapsedMs();
    state.running = false;
  }

  function toggleStartStop(){
    if(state.running) stopChrono();
    else startChrono();
  }

  function resetChrono(){
    state.running = false;
    state.storedMs = 0;
    state.splitFrozen = false;
    state.splitFrozenMs = 0;
    state.splitCatchupActive = false;
    state.hourSnapActive = false;
    state.restartAfterSnap = false;

    setAngle(secMain, 0);
    setAngle(secSplit, 0);
    setAngle(minHand, 0);
    setAngle(hourHand, HOUR_START_DEG);
  }

  function startHourSnap(fromDeg, restartAfter){
    state.hourSnapActive = true;
    state.hourSnapStartMs = nowMs();
    state.hourSnapFromDeg = fromDeg;
    state.restartAfterSnap = !!restartAfter;
  }

  function flybackChrono(){
    const elapsed = getElapsedMs();
    const currentHourDeg = hourAngleFromElapsed(elapsed);
    const restart = state.running;

    state.running = false;
    state.storedMs = 0;
    state.splitFrozen = false;
    state.splitFrozenMs = 0;

    setAngle(secMain, 0);
    setAngle(secSplit, 0);
    setAngle(minHand, 0);
    startHourSnap(currentHourDeg, restart);
  }

  /* ======= split API prepared for later button ======= */
  function splitFreeze(){
    if(!state.running) return;
    if(state.splitFrozen) return;
    state.splitFrozen = true;
    state.splitFrozenMs = getElapsedMs();
    state.splitCatchupActive = false;
  }

  function splitCatchUp(){
    if(!state.splitFrozen) return;
    const frozenDeg = ((state.splitFrozenMs % SEC_REV_MS) / SEC_REV_MS) * 360 + SPLIT_VISIBLE_OFFSET_DEG;
    state.splitCatchupActive = true;
    state.splitCatchupStartMs = nowMs();
    state.splitCatchupFromDeg = frozenDeg;
    state.splitFrozen = false;
  }

  window.__chronoStart = startChrono;
  window.__chronoStop = stopChrono;
  window.__chronoToggleStartStop = toggleStartStop;
  window.__chronoReset = resetChrono;
  window.__chronoFlyback = flybackChrono;
  window.__chronoSplitFreeze = splitFreeze;
  window.__chronoSplitCatchUp = splitCatchUp;

  /* ======= bind buttons ======= */
  function bindChronoButton(btn, fn){
    if(!btn) return;
    let touchHandled = false;
    let mouseHandled = false;

    btn.addEventListener('touchstart', function(e){
      touchHandled = true;
      e.preventDefault();
      e.stopPropagation();
    }, {passive:false});

    btn.addEventListener('touchend', function(e){
      e.preventDefault();
      e.stopPropagation();
      fn();
      setTimeout(()=>{ touchHandled = false; }, 0);
    }, {passive:false});

    btn.addEventListener('pointerdown', function(e){
      e.preventDefault();
      e.stopPropagation();
    }, {passive:false});

    btn.addEventListener('pointerup', function(e){
      e.preventDefault();
      e.stopPropagation();
      if(e.pointerType === 'mouse' || e.pointerType === 'pen'){
        mouseHandled = true;
        fn();
        setTimeout(()=>{ mouseHandled = false; }, 450);
      }
    }, {passive:false});

    btn.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      if(mouseHandled) return;
      if(!touchHandled) fn();
    }, {passive:false});
  }

  bindChronoButton(btnStart, function(){
    if(!state.running && state.storedMs > 0){
      resetChrono();   // 3rd press = reset
    } else {
      toggleStartStop(); // start / stop
    }
  });

  bindChronoButton(btnFly, function(){
    if(!state.running) return;
    if(!state.splitFrozen){
      splitFreeze();   // split
    } else {
      splitCatchUp();  // catch-up
    }
  });

  /* ======= animation loop ======= */
  function animate(){
    const elapsed = getElapsedMs();

    /* central chrono seconds */
    const secDeg = ((elapsed % SEC_REV_MS) / SEC_REV_MS) * 360;
    setAngle(secMain, secDeg);

    /* split-seconds */
    const mainDeg = secDeg;

    if(state.splitFrozen){
      const frozenDeg = ((state.splitFrozenMs % SEC_REV_MS) / SEC_REV_MS) * 360 + SPLIT_VISIBLE_OFFSET_DEG;
      setAngle(secSplit, frozenDeg);
    } else if(state.splitCatchupActive){
      const t = clamp((nowMs() - state.splitCatchupStartMs) / SPLIT_CATCHUP_MS, 0, 1);
      // mechanical feel: tiny hesitation, then quicker catch-up
      const eased = (t < 0.18)
        ? (0.10 * (t / 0.18))
        : (0.10 + 0.90 * (1 - Math.pow(1 - ((t - 0.18) / 0.82), 3)));
      const currentMainDeg = mainDeg;
      let delta = currentMainDeg - state.splitCatchupFromDeg;
      while(delta < 0) delta += 360;
      const catchDeg = state.splitCatchupFromDeg + delta * eased;
      setAngle(secSplit, catchDeg);
      if(t >= 1){
        state.splitCatchupActive = false;
      }
    } else {
      setAngle(secSplit, mainDeg);
    }

    /* 30-minute counter */
    const minDeg = ((elapsed % MIN_REV_MS) / MIN_REV_MS) * 360;
    setAngle(minHand, minDeg);

    /* 12-hour retrograde counter */
    if(state.hourSnapActive){
      const t = clamp((nowMs() - state.hourSnapStartMs) / HOUR_SNAP_MS, 0, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      const deg = state.hourSnapFromDeg + (HOUR_START_DEG - state.hourSnapFromDeg) * eased;
      setAngle(hourHand, deg);

      if(t >= 1){
        state.hourSnapActive = false;
        setAngle(hourHand, HOUR_START_DEG);
        if(state.restartAfterSnap){
          state.startMs = nowMs();
          state.running = true;
          state.restartAfterSnap = false;
        }
      }
    } else {
      setAngle(hourHand, hourAngleFromElapsed(elapsed));
    }

    requestAnimationFrame(animate);
  }

  /* initial state */
  resetChrono();
  requestAnimationFrame(animate);
})();
</script>

<script>
(function(){
  const eqMinDeg = 112;
  const eqMaxDeg = 240;

  function dayOfYearFraction(date){
    const start = new Date(date.getFullYear(), 0, 0);
    return (date - start) / 86400000;
  }

  // Approximation of Equation of Time in minutes.
  function getEquationOfTimeMinutes(date){
    const n = dayOfYearFraction(date);
    const B = 2 * Math.PI * (n - 81) / 364;
    return 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
  }

  function setEqPointerFromMinutes(minutes){
    const el = document.getElementById('L15');
    if(!el) return;

    // User-approved display scale: -15 min = left, +15 min = right
    const clamped = Math.max(-15, Math.min(15, minutes));
    const angle = eqMaxDeg - ((clamped + 15) / 30) * (eqMaxDeg - eqMinDeg);
    el.style.transform = "rotate(" + angle + "deg)";
  }

  function updateEqPointer(){
    const now = new Date();
    const eotMinutes = getEquationOfTimeMinutes(now);
    setEqPointerFromMinutes(eotMinutes);
  }

  updateEqPointer();
  setInterval(updateEqPointer, 60000);
})();
</script>

      return Math.atan2(v[1], v[0]) * 180 / Math.PI;
    }

      const top  = pxNum(cs.top);
      const width = pxNum(cs.width);
      const height = pxNum(cs.height);
      const o = getOriginPair(el);

      const isGMTShape =
        Math.abs(o.ox - 22) < 1.5 &&
        Math.abs(o.oy - 110) < 1.5 &&
        width > 40 && width < 50 &&
        height > 145 && height < 160;

      if(!isGMTShape) continue;

      const isLeftGMT  = left > 1240 && left < 1290 && top > 1640 && top < 1675;
      const isRightGMT = left > 2040 && left < 2090 && top > 1650 && top < 1685;

      if(isLeftGMT){
        applyShadow(el, { dist: 6, baseY: 4.5, biasX: -0.8, blur1: 2.2, op1: 0.17, scale2: 0.45, blur2: 3.0, op2: 0.10 });
      } else if(isRightGMT){
        applyShadow(el, { dist: 6, baseY: 4.5, biasX: 0.8, blur1: 2.2, op1: 0.17, scale2: 0.45, blur2: 3.0, op2: 0.10 });
      }
    }
  }

  initGMTShadows();
})();

<script>
(function(){
  function pxNum(v){
    if(!v) return 0;
    const n = parseFloat(String(v).replace('px','').trim());
    return isNaN(n) ? 0 : n;
  }

  function getOriginPair(el){
    const cs = getComputedStyle(el);
    const parts = (cs.transformOrigin || '').split(' ');
    return {
      ox: pxNum(parts[0]),
      oy: pxNum(parts[1])
    };
  }

  function getAngleDeg(el){
    const t = getComputedStyle(el).transform;
    if(!t || t === 'none') return 0;

    const m = t.match(/matrix\(([^)]+)\)/);
    if(m){
      const v = m[1].split(',').map(Number);
      return Math.atan2(v[1], v[0]) * 180 / Math.PI;
    }

    const m3 = t.match(/matrix3d\(([^)]+)\)/);
    if(m3){
      const v = m3[1].split(',').map(Number);
      return Math.atan2(v[1], v[0]) * 180 / Math.PI;
    }

    return 0;
  }

  function applyExtraShadow(el, cfg){
    const rad = getAngleDeg(el) * Math.PI / 180;
    const dx1 = Math.sin(rad) * cfg.dist + cfg.biasX;
    const dy1 = cfg.baseY;
    const dx2 = dx1 * cfg.scale2;
    const dy2 = dy1 * 0.6;

    const extra =
      'drop-shadow(' + dx1.toFixed(2) + 'px ' + dy1.toFixed(2) + 'px ' + cfg.blur1 + 'px rgba(0,0,0,' + cfg.op1 + ')) ' +
      'drop-shadow(' + dx2.toFixed(2) + 'px ' + dy2.toFixed(2) + 'px ' + cfg.blur2 + 'px rgba(0,0,0,' + cfg.op2 + '))';

    if(!el.dataset.chronoSmallShadowApplied){
      el.style.filter = (el.style.filter ? el.style.filter + ' ' : '') + extra;
      el.dataset.chronoSmallShadowApplied = '1';
    }
  }

  function initChronoSmallShadows(){
    const els = document.querySelectorAll('.layer');
    for(const el of els){
      const cs = getComputedStyle(el);
      const left = pxNum(cs.left);
      const top  = pxNum(cs.top);
      const width = pxNum(cs.width);
      const height = pxNum(cs.height);
      const o = getOriginPair(el);

      // ch_hour.png | pivot 22,226 | Z2 | Chrono Stunden oben rot
      const isChHour =
        Math.abs(o.ox - 22) < 1.5 &&
        Math.abs(o.oy - 226) < 1.5 &&
        width > 40 && width < 52 &&
        height > 235 && height < 260 &&
        left > 1650 && left < 1685 &&
        top > 470 && top < 490;

      // ch_min.png | pivot 26,118 | Z4 | Chrono Minuten rot rechts
      const isChMin =
        Math.abs(o.ox - 26) < 1.5 &&
        Math.abs(o.oy - 118) < 1.5 &&
        width > 50 && width < 60 &&
        height > 155 && height < 175 &&
        left > 1970 && left < 1995 &&
        top > 1235 && top < 1255;

      if(isChHour){
        applyExtraShadow(el, { dist: 7, baseY: 5, biasX: 0, blur1: 2.5, op1: 0.19, scale2: 0.45, blur2: 3.3, op2: 0.11 });
      } else if(isChMin){
        applyExtraShadow(el, { dist: 6, baseY: 4.5, biasX: 0.6, blur1: 2.4, op1: 0.18, scale2: 0.45, blur2: 3.2, op2: 0.10 });
      }
    }
  }

  initChronoSmallShadows();
})();
</script>

function animate(el, cfg){
  el.animate([
    {opacity:0, transform:`translate(-50%,-50%) scale(${cfg.s0}) rotate(0deg)`},
    {opacity:0.75, transform:`translate(-50%,-50%) scale(${cfg.s1}) rotate(6deg)`, offset:0.4},

<script>
(function(){
  function ensureGlassOverlay(){
    const stage = document.getElementById('stage');
    if(!stage) return null;

    let overlay = document.getElementById('glassOverlay');
    if(overlay) return overlay;

    overlay = document.createElement('div');
    overlay.id = 'glassOverlay';

    const topGlow = document.createElement('div');
    topGlow.id = 'glassTopGlow';

    const sweepMain = document.createElement('div');
    sweepMain.className = 'glassSweep';
    sweepMain.id = 'glassSweepMain';

    const sweepMini = document.createElement('div');
    sweepMini.className = 'glassSweep';
    sweepMini.id = 'glassSweepMini';

    overlay.appendChild(topGlow);
    overlay.appendChild(sweepMain);
    overlay.appendChild(sweepMini);
    stage.appendChild(overlay);
    return overlay;
  }

  function randomBetween(min, max){
    return min + Math.random() * (max - min);
  }

  function runSweep(el, opts){
    const angle = opts.angle;
    const width = opts.width;
    const blur = opts.blur;
    const peak = opts.peak;

    el.style.width = width + '%';
    el.style.filter = 'blur(' + blur + 'px)';
    el.animate([
      {
        opacity: 0,
        transform: 'translateX(-8%) rotate(' + angle + 'deg)'
      },
      {
        opacity: peak,
        transform: 'translateX(260%) rotate(' + angle + 'deg)',
        offset: 0.5
      },
      {
        opacity: 0,
        transform: 'translateX(530%) rotate(' + angle + 'deg)'
      }
    ], {
      duration: opts.duration,
      easing: 'ease-in-out'
    });
  }

  function loopGlass(){
    const main = document.getElementById('glassSweepMain');
    const mini = document.getElementById('glassSweepMini');
    if(!main || !mini) return;

    const angle = Math.random() < 0.5 ? 22 : -22;

    runSweep(main, {
      angle: angle,
      width: 20,
      blur: 7,
      peak: 0.80,
      duration: 650
    });

    if(Math.random() < 0.38){
      setTimeout(function(){
        runSweep(mini, {
          angle: angle + (Math.random() < 0.5 ? -3 : 3),
          width: 13,
          blur: 8,
          peak: 0.50,
          duration: 480
        });
      }, 300);
    }

    const next = randomBetween(4000, 7000);
    setTimeout(loopGlass, next);
  }

  window.addEventListener('load', function(){
    ensureGlassOverlay();
    setTimeout(loopGlass, 1200);
  });
})();
</script>

<script id="info-ui-js">
(function(){
  let infoVisible = false;
  let currentLang = "en";   // remembers last chosen language

  const overlay = document.getElementById("infoOverlay");
  const hitInfo = document.getElementById("HIT_INFO_STAGE");
  const hitEn = document.getElementById("HIT_EN_STAGE");
  const hitDe = document.getElementById("HIT_DE_STAGE");
  const hitJp = document.getElementById("HIT_JP_STAGE");
  const labelInfo = document.getElementById("infoToggle");
  const labelEn = document.getElementById("infoEn");
  const labelDe = document.getElementById("infoDe");
  const labelJp = document.getElementById("infoJp");

  if(!overlay || !hitInfo || !hitEn || !hitDe || !hitJp || !labelInfo || !labelEn || !labelDe || !labelJp) return;

  const srcEn = overlay.getAttribute("data-src-en");
  const srcDe = overlay.getAttribute("data-src-de");
  const srcJp = overlay.getAttribute("data-src-jp");

  // Preload off-DOM only; keep just ONE stage overlay element live.
  const cache = {
    en: new Image(),
    de: new Image(),
    jp: new Image()
  };
  cache.en.src = srcEn;
  cache.de.src = srcDe;
  cache.jp.src = srcJp;

  function stopEvent(e){
    if(!e) return;
    if (typeof e.preventDefault === "function") e.preventDefault();
    if (typeof e.stopPropagation === "function") e.stopPropagation();
    if (typeof e.stopImmediatePropagation === "function") e.stopImmediatePropagation();
  }

  function flash(el){
    if(!el) return;
    el.classList.remove('infoFlash');
    void el.offsetWidth;
    el.classList.add('infoFlash');
    setTimeout(function(){ el.classList.remove('infoFlash'); }, 220);
  }

  function applyButtons(){
    labelInfo.textContent = infoVisible ? "INFO: OFF" : "INFO";
    labelInfo.classList.toggle("active", infoVisible);
    labelEn.classList.toggle("active", infoVisible && currentLang === "en");
    labelDe.classList.toggle("active", infoVisible && currentLang === "de");
    labelJp.classList.toggle("active", infoVisible && currentLang === "jp");
  }

  function currentSrc(){
    if(currentLang === "de") return srcDe;
    if(currentLang === "jp") return srcJp;
    return srcEn;
  }

  function showCurrentOverlay(){
    const src = currentSrc();
    if (!src) return;
    if (overlay.src !== src) overlay.src = src;
    overlay.style.setProperty("display", "block", "important");
    infoVisible = true;
    applyButtons();
  }

  function hideOverlay(){
    overlay.style.setProperty("display", "none", "important");
    infoVisible = false;
    applyButtons();
  }

  // INFO = only on/off. It does NOT force EN anymore.
  function onInfo(e){
    stopEvent(e);
    flash(labelInfo);
    if(infoVisible){
      hideOverlay();
    } else {
      showCurrentOverlay();
    }
    return false;
  }

  // EN / DE / JP = only choose language and show that overlay.
  function onLang(lang, label){
    return function(e){
      stopEvent(e);
      flash(label);
      currentLang = lang;
      showCurrentOverlay();
      return false;
    };
  }

  hitInfo.addEventListener('pointerdown', onInfo, {passive:false});
  hitEn.addEventListener('pointerdown', onLang('en', labelEn), {passive:false});
  hitDe.addEventListener('pointerdown', onLang('de', labelDe), {passive:false});
  hitJp.addEventListener('pointerdown', onLang('jp', labelJp), {passive:false});

  hideOverlay();
})();
</script>








<script id="v92-pc-fix-hit16-hit20">
(function(){
  const isTouch = () => window.matchMedia && window.matchMedia('(pointer: coarse)').matches;

  function guard(id, thresholdMs){
    const el = document.getElementById(id);
    if(!el) return;

    let lastPointerUpTs = 0;

    el.addEventListener('pointerup', function(e){
      if (e.pointerType === 'mouse' || e.pointerType === 'pen') {
        lastPointerUpTs = Date.now();
      }
    }, true);

    el.addEventListener('click', function(e){
      if (!isTouch() && (Date.now() - lastPointerUpTs) < thresholdMs) {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        return false;
      }
    }, true);
  }

  guard('HIT_Z16_TEST', 400); // Petit / Grand Sonnerie
  guard('HIT_Z20_TEST', 400); // Sonnerie / Silence
})();
</script>



<script id="v119-pinch-stable-not-blocked-js">
(function(){
  const touchLike = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
  if(!touchLike) return;

  // Keep Safari from engaging its dedicated gesture zoom handling,
  // but do not hard-block generic 2-finger touchmove, which can trigger
  // unwanted browser/app-closing gestures when pinching back.
  document.addEventListener('gesturestart', function(e){
    e.preventDefault();
  }, {passive:false});

  document.addEventListener('gesturechange', function(e){
    e.preventDefault();
  }, {passive:false});

  document.addEventListener('gestureend', function(e){
    e.preventDefault();
  }, {passive:false});

  let lastTouchEnd = 0;
  document.addEventListener('touchend', function(e){
    const now = Date.now();
    if (now - lastTouchEnd < 300) {
      e.preventDefault();
    }
    lastTouchEnd = now;
  }, {passive:false});
})();
</script>


<script id="v120-ios-zoom-gesture-guard">
(function(){
  const touchLike = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
  if(!touchLike) return;

  const viewer = document.getElementById('viewer');
  if(!viewer) return;

  function currentZoom(){
    try{
      if (typeof zoomFactor !== 'undefined') return zoomFactor;
    }catch(err){}
    return 1;
  }

  // When already zoomed, keep pan/touch gestures inside the viewer and
  // reduce the chance that Safari interprets them as browser/app gestures.
  ['touchstart','touchmove','touchend','pointerdown','pointermove','pointerup'].forEach(function(type){
    viewer.addEventListener(type, function(e){
      if (currentZoom() > 1.001) {
        if (typeof e.stopPropagation === 'function') e.stopPropagation();
        if (typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
      }
    }, true);
  });

  // If a single-finger pan starts while zoomed, keep it inside the viewer.
  viewer.addEventListener('touchmove', function(e){
    if (currentZoom() > 1.001 && e.touches && e.touches.length === 1) {
      // do not preventDefault, just isolate from outer browser handlers
      if (typeof e.stopPropagation === 'function') e.stopPropagation();
      if (typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
    }
  }, {passive:false, capture:true});
})();
</script>
