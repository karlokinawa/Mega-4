<style>
:root {
  --stage-w: 3784;

  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
}
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  touch-action: manipulation;
  font-family: Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at 50% 38%, rgba(118, 155, 214, 0.24) 0%, rgba(55, 86, 142, 0.18) 18%, rgba(16, 35, 74, 0.88) 46%, rgba(5, 12, 29, 1) 100%),
    linear-gradient(180deg, #0f2148 0%, #0a1732 36%, #071022 68%, #040811 100%);
  color: #ddd;
}
body { position: fixed; inset: 0; }
#viewer {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding-top: var(--safe-top);
  padding-right: var(--safe-right);
  padding-bottom: var(--safe-bottom);
  padding-left: var(--safe-left);
  box-sizing: border-box;
  scroll-behavior: auto;
}
#viewer.zoom-mode {
  display: block;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x pan-y;
}
/* During zoom on phones/tablets, slightly reduce expensive overlay work */
#viewer.zoom-mode #glassTopGlow,
#viewer.zoom-mode .glassSweep {
  opacity: 0 !important;
}
#viewer.zoom-mode #infoOverlay {
  filter: none !important;
}
#stageShell {
  position: relative;
  flex: 0 0 auto;
  width: calc(var(--stage-w) * 1px);
  height: calc(var(--stage-h) * 1px);
  will-change: width, height;
}
#stage {
  position: relative;
  width: 3784px;
  height: 2838px;
  overflow: visible;
  margin: 0;
  background: transparent;
  transform-origin: top left;
  will-change: transform;
}
.layer {
  position: absolute;
  transform-origin: 0 0;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}
#dial { left: 0; top: 0; width: 3784px; height: 2838px; transform:none !important; }
#sec_wheel2 { left: 1520px; top: 1613px; width: 273px; height: 265px; }

#controls {
  position: fixed;
  right: calc(12px + var(--safe-right));
  top: calc(12px + var(--safe-top));
  z-index: 50;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ctrl {
  appearance: none;
  border: 1px solid rgba(255,255,255,.24);
  color: #fff;
  min-width: 52px;
  min-height: 44px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
#hint {
  position: fixed;
  left: calc(12px + var(--safe-left));
  bottom: calc(12px + var(--safe-bottom));
  z-index: 50;
  padding: 10px 12px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.35;
  color: rgba(255,255,255,.92);
  border: 1px solid rgba(255,255,255,.18);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

#controls { display:none !important; }
#hint { display:none !important; }

<script>
(() => {
  const root = document.documentElement;
  const viewer = document.getElementById('viewer');
  const shell = document.getElementById('stageShell');
  const stage = document.getElementById('stage');
  const btnIn = document.getElementById('zoomIn');
  const btnOut = document.getElementById('zoomOut');
  const btnReset = document.getElementById('zoomReset');
  const btnTourb = document.getElementById('zoomTourb');
  const STAGE_W = 3784;
  const STAGE_H = 2838;
  const TOURB_X = 1697;
  const TOURB_Y = 1780;
  let autoFitScale = 1;
  let zoomFactor = 1;

  function getSafe() {
    const cs = getComputedStyle(root);
    return {
      top: parseFloat(cs.getPropertyValue('--safe-top')) || 0,
      right: parseFloat(cs.getPropertyValue('--safe-right')) || 0,
      bottom: parseFloat(cs.getPropertyValue('--safe-bottom')) || 0,
      left: parseFloat(cs.getPropertyValue('--safe-left')) || 0,
    };
  }

  function computeAutoFit() {
    const safe = getSafe();
    const availW = Math.max(1, window.innerWidth - safe.left - safe.right);
    const availH = Math.max(1, window.innerHeight - safe.top - safe.bottom);
    autoFitScale = Math.min(availW / STAGE_W, availH / STAGE_H);
    if (zoomFactor < 1) zoomFactor = 1;
  }

  function applyScale() {
    const coarsePointer = !!(window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
    const desktopLike = !coarsePointer;
    const desktopFitFactor = desktopLike ? 0.88 : 1;
    const inZoomMode = zoomFactor > 1.001;
    const mobileZoomStabilizer = (coarsePointer && inZoomMode) ? 0.92 : 1;
    const totalScale = autoFitScale * zoomFactor * desktopFitFactor * mobileZoomStabilizer;
    shell.style.width = `${Math.round(STAGE_W * totalScale)}px`;
    shell.style.height = `${Math.round(STAGE_H * totalScale)}px`;
    stage.style.transform = `scale(${totalScale})`;
    root.style.setProperty('--stage-scale', String(totalScale));
    if (inZoomMode) {
      viewer.classList.add('zoom-mode');
    } else {
      viewer.classList.remove('zoom-mode');
      viewer.scrollLeft = 0;
      viewer.scrollTop = 0;
    }
  }

  function fit() {
    computeAutoFit();
    applyScale();
  }

  function centerOnStagePoint(x, y) {
    if (zoomFactor <= 1.001) return;
    const scale = autoFitScale * zoomFactor;
    const safe = getSafe();
    const viewportW = window.innerWidth - safe.left - safe.right;
    const viewportH = window.innerHeight - safe.top - safe.bottom;
    const targetLeft = Math.max(0, x * scale - viewportW / 2);
    const targetTop = Math.max(0, y * scale - viewportH / 2);
    viewer.scrollLeft = targetLeft;
    viewer.scrollTop = targetTop;
  }

  function setZoomFactor(nextFactor, centerTourb=false) {
    zoomFactor = Math.max(1, Math.min(4, nextFactor));
    applyScale();
    if (centerTourb) centerOnStagePoint(TOURB_X, TOURB_Y);
  }

  btnIn.addEventListener('click', () => setZoomFactor(zoomFactor * 1.25, true));
  btnOut.addEventListener('click', () => setZoomFactor(zoomFactor / 1.25, true));
  btnReset.addEventListener('click', () => setZoomFactor(1, false));
  btnTourb.addEventListener('click', () => {
    if (zoomFactor <= 1.001) zoomFactor = 2;
    applyScale();
    centerOnStagePoint(TOURB_X, TOURB_Y);
  });

  let lastTap = 0;
  viewer.addEventListener('pointerup', (e) => {
    const now = Date.now();
    if (now - lastTap < 280) {
      if (zoomFactor <= 1.001) setZoomFactor(2, true);
    }
    lastTap = now;
  });

  window.addEventListener('resize', fit, { passive: true });
  window.addEventListener('orientationchange', fit, { passive: true });
  fit();
})();
</script>

    el.style.transformOrigin = `${pivot[key].x}px ${pivot[key].y}px`;
  }

  const PERIOD_BALANCE_MS = 500;

  const MOON_HALF_CYCLE_MS = 60000; // TEST MODE: 180° in 60 seconds // 180° per full moon cycle test

  // Global master center Z6
  const Z6 = { x: 1697, y: 1780 };

  const Z5 = { x: 2083, y: 1778 };

  // =========================

  let offsetLeft = 0;
  let offsetRight = 0;

  const hitGMTMinus = document.getElementById('hit_gmt_minus');
  const hitGMTPlus = document.getElementById('hit_gmt_plus');

  function bindTapAction(el, action) {
    if (!el) return;
    let touchHandled = false;

    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      e.stopPropagation();
    }, { passive: false });

    el.addEventListener('touchend', (e) => {
      e.preventDefault();
      e.stopPropagation();
      touchHandled = true;
      action();
      setTimeout(() => { touchHandled = false; }, 0);
    }, { passive: false });

    el.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
    }, { passive: true });

    el.addEventListener('pointerup', (e) => {
      e.stopPropagation();
    }, { passive: true });

    el.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (touchHandled) return;
      action();
    }, { passive: false });
  }

    offsetLeft -= 1;
  });

  bindTapAction(hitGMTPlus, () => {
    playClickHeavy();
    offsetRight += 1;
  });

  function getTimeParts(timeZone) {
    const parts = new Intl.DateTimeFormat('en-GB', {
      timeZone,
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hourCycle: 'h23'
    }).formatToParts(new Date());

    const get = (type) => Number(parts.find(p => p.type === type).value);
    return {
      hour: get('hour'),
      minute: get('minute'),
      second: get('second')
    };
  }


  // Current global pivot positions from the stable layout:
  // pinion1 = left 1495 + pivotX 102 = 1597 / top 1575 + pivotY 111 = 1686
  // pinion2 = left 1459 + pivotX 126 = 1585 / top 1717 + pivotY  71 = 1788
  // These offsets are now rotated around Z6 in true seconds takt.
  const orbit1 = { x: 1597 - Z6.x, y: 1686 - Z6.y };
  const orbit2 = { x: 1585 - Z6.x, y: 1788 - Z6.y };

  function rotatePointCW(vx, vy, deg) {
    const r = deg * Math.PI / 180;
    const c = Math.cos(r);
    const s = Math.sin(r);
    return {
      x: vx * c - vy * s,
      y: vx * s + vy * c
    };
  }

  function setElementPivotAt(el, globalX, globalY, piv) {
    el.style.left = `${globalX - piv.x}px`;
    el.style.top = `${globalY - piv.y}px`;
  }

  function animate(ts) {
    const now = Date.now();

    if (typeof animate._lastTs === 'undefined') {
      animate._lastTs = ts || performance.now();
      animate._balanceAngle = 18;
      animate._balanceDir = -1;
      animate._pinion1Phase = 0;
      animate._lastNow = now;
    }

    const frameNow = ts || performance.now();
    const dtFrame = Math.min(0.05, Math.max(0, (frameNow - animate._lastTs) / 1000));
    animate._lastTs = frameNow;

    // Browser local system time driven motion
    const msWithinMinute = now % SEC_REVOLUTION_MS;

    // L02 Moon disc: double-moon disc, 180° per full moon cycle

    const MOON_CYCLE_DAYS = 29.530588;
    const DEG_PER_DAY = 180 / MOON_CYCLE_DAYS;

    const KNOWN_NEW_MOON = Date.UTC(2024, 1, 10, 23, 59, 0);

    const daysElapsed = (Date.now() - KNOWN_NEW_MOON) / (1000 * 60 * 60 * 24);
    const cycleDay = ((daysElapsed % MOON_CYCLE_DAYS) + MOON_CYCLE_DAYS) % MOON_CYCLE_DAYS;

    const moonAngle = cycleDay * DEG_PER_DAY;



    const zurich = getTimeParts('Europe/Zurich');
    const tokyo = getTimeParts('Asia/Tokyo');

    const zurich24 = zurich.hour
      + zurich.minute / 60
      + zurich.second / 3600
      + offsetLeft;

    const tokyo24 = tokyo.hour
      + tokyo.minute / 60
      + tokyo.second / 3600
      + offsetRight;

    const gmtDialOffset = 90;
    const gmtLeftAngle = (((((zurich24 % 24) + 24) % 24) * 15) + gmtDialOffset) % 360;
    const gmtRightAngle = (((((tokyo24 % 24) + 24) % 24) * 15) + gmtDialOffset) % 360;

    // L08 Tourbillon cage: continuous 360° / 60 s
    const cageAngle = (msWithinMinute / SEC_REVOLUTION_MS) * 360;

    // L07 Balance: free fast oscillation, not tied to absolute clock time
    const BALANCE_MAX_ANGLE = 18;
    const BALANCE_SPEED_DEG_PER_SEC = 420;
    animate._balanceAngle += BALANCE_SPEED_DEG_PER_SEC * dtFrame * animate._balanceDir;
    if (animate._balanceAngle >= BALANCE_MAX_ANGLE) {
      animate._balanceAngle = BALANCE_MAX_ANGLE;
      animate._balanceDir = -1;
    } else if (animate._balanceAngle <= -BALANCE_MAX_ANGLE) {
      animate._balanceAngle = -BALANCE_MAX_ANGLE;
      animate._balanceDir = 1;
    }
    const balanceAngle = animate._balanceAngle;

    // L04 Rear seconds wheel: continuous rotation 360° / 60 s (CW)
    const secWheelAngle = (msWithinMinute / SEC_REVOLUTION_MS) * 360;

    // L06/L05 Tourbillon sync: pinion1 steps exactly with hammer cycle
    const p1 = rotatePointCW(orbit1.x, orbit1.y, secWheelAngle);
    setElementPivotAt(els.pinion1, Z6.x + p1.x, Z6.y + p1.y, pivot.pinion1);

    const p2 = rotatePointCW(orbit2.x, orbit2.y, secWheelAngle);
    setElementPivotAt(els.pinion2, Z6.x + p2.x, Z6.y + p2.y, pivot.pinion2);

    const PINION1_SPEED_DEG_PER_SEC = 67.6;

    // Hammer phase 0..1
    const hammerCycle = (now % PERIOD_PINION2_MS) / PERIOD_PINION2_MS;

    // Short brake window near hammer contact
    let brake = 1.0;
    if (hammerCycle > 0.72) {
      const t = (hammerCycle - 0.72) / (1.0 - 0.72);
      brake = 1.0 - Math.sin(t * Math.PI * 0.5) * 0.85;
    }

    const dt = (now - animate._lastNow) / 1000;
    animate._lastNow = now;

    animate._pinion1Phase += PINION1_SPEED_DEG_PER_SEC * brake * dt;

    const pinion1Angle = secWheelAngle + animate._pinion1Phase;

    const pinion2Hammer = 18 * Math.sin((2 * Math.PI * now) / PERIOD_PINION2_MS);
    const pinion2Angle = secWheelAngle + pinion2Hammer;

    if (els.moon) els.moon.style.transform = `rotate(${moonAngle}deg)`;
    if (els.gmtLeft) els.gmtLeft.style.transform = `rotate(${gmtLeftAngle}deg)`;
    if (els.gmtRight) els.gmtRight.style.transform = `rotate(${gmtRightAngle}deg)`;
    els.cage.style.transform = `rotate(${cageAngle}deg)`;
    els.balance.style.transform = `rotate(${balanceAngle}deg)`;
    els.pinion1.style.transform = `rotate(${pinion1Angle}deg)`;
    els.pinion2.style.transform = `rotate(${pinion2Angle}deg)`;
    els.secWheel.style.transform = `rotate(${secWheelAngle}deg)`;

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
})();

<script>
(function () {
  const viewer = document.getElementById('viewer');
  const stageShell = document.getElementById('stageShell');
  const stage = document.getElementById('stage');
  if (!viewer || !stageShell || !stage) return;

  const isTouchLike = () => ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (isTouchLike()) return; // leave iPhone/iPad touch behavior unchanged

  let fitScale = 1;
  let zoomScale = 1;
  let panX = 0;
  let panY = 0;
  let isDragging = false;
  let startX = 0;
  let startY = 0;
  let moved = false;

  function clamp(v, min, max) {
    return Math.min(max, Math.max(min, v));
  }

  function computeFitScale() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const sw = stage.offsetWidth;
    const sh = stage.offsetHeight;
    fitScale = Math.min(vw / sw, vh / sh);
    if (!isFinite(fitScale) || fitScale <= 0) fitScale = 1;
  }

  function applyPCZoom() {
    document.body.classList.add('pc-zoom-active');
    const totalScale = fitScale * zoomScale;
    stageShell.style.transformOrigin = 'center center';
    stageShell.style.transform = `translate(${panX}px, ${panY}px) scale(${totalScale})`;
  }

  function resetView() {
    zoomScale = 1;
    panX = 0;
    panY = 0;
    applyPCZoom();
  }

  function zoomAt(clientX, clientY, factor) {
    const rect = viewer.getBoundingClientRect();
    const cx = clientX - rect.left - rect.width / 2;
    const cy = clientY - rect.top - rect.height / 2;

    const oldScale = fitScale * zoomScale;
    const newZoom = clamp(zoomScale * factor, 1, 6);
    const newScale = fitScale * newZoom;
    const scaleRatio = newScale / oldScale;

    panX = cx - (cx - panX) * scaleRatio;
    panY = cy - (cy - panY) * scaleRatio;
    zoomScale = newZoom;
    applyPCZoom();
  }

  function recenterIfNeeded() {
    if (zoomScale <= 1.001) {
      panX = 0;
      panY = 0;
    }
  }

  computeFitScale();
  applyPCZoom();

  window.addEventListener('resize', () => {
    computeFitScale();
    recenterIfNeeded();
    applyPCZoom();
  });

  viewer.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    zoomAt(e.clientX, e.clientY, factor);
  }, { passive: false });

  stageShell.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    if (zoomScale <= 1.001) return;
    isDragging = true;
    moved = false;
    startX = e.clientX - panX;
    startY = e.clientY - panY;
    document.body.classList.add('dragging');
    e.preventDefault();
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const nextX = e.clientX - startX;
    const nextY = e.clientY - startY;
    if (Math.abs(nextX - panX) > 1 || Math.abs(nextY - panY) > 1) moved = true;
    panX = nextX;
    panY = nextY;
    applyPCZoom();
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
    document.body.classList.remove('dragging');
  });

  stageShell.addEventListener('dblclick', (e) => {
    e.preventDefault();
    resetView();
  });

  // Prevent image ghost dragging on desktop
  stageShell.querySelectorAll('img').forEach(img => {
    img.setAttribute('draggable', 'false');
  });
})();
</script>

<script>
(function(){
  const shieldButton = (el) => {
    if (!el) return;

    // Keep button taps from reaching viewer/stage handlers,
    // but do NOT cancel the button's own click behavior.
    const stopBubble = (e) => {
      e.stopPropagation();
    };

    el.addEventListener('pointerdown', stopBubble, { passive: true });
    el.addEventListener('pointerup', stopBubble, { passive: true });
    el.addEventListener('click', stopBubble, { passive: true });
    el.addEventListener('touchstart', stopBubble, { passive: true });
    el.addEventListener('touchend', stopBubble, { passive: true });
    el.addEventListener('dblclick', stopBubble, { passive: true });
  };

  document.querySelectorAll('.hit-zone, #soundButton, #btnSound, #btnInfo, #btnFit').forEach(shieldButton);

  // Extra iPhone double-tap zoom blocker for the page background,
  // but avoid interfering with button taps.
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function(e){
    if (e.target && e.target.closest('.hit-zone, #soundButton, #btnSound, #btnInfo, #btnFit')) {
      lastTouchEnd = Date.now();
      return;
    }
    const now = Date.now();
    if (now - lastTouchEnd < 300) {
      e.preventDefault();
    }
    lastTouchEnd = now;
  }, { passive: false });
})();
</script>

<script>
(function(){
  const h24 = document.getElementById('h24');
  const leap = document.getElementById('leap');
  if(!h24 || !leap) return;

  function getLeapIndex(year){
    const mod = ((year % 4) + 4) % 4;
    return mod;
  }

  function updateSubdials(){
    const now = new Date();

    const h = now.getHours();
    const m = now.getMinutes();
    const s = now.getSeconds();
    const ms = now.getMilliseconds();

    const day24 = h + (m / 60) + (s / 3600) + (ms / 3600000);
    const deg24 = (day24 / 24) * 360;

    const leapIndex = getLeapIndex(now.getFullYear());
    const degLeap = (leapIndex * 90) - 45;

    h24.style.transform = `rotate(${deg24}deg)`;
    leap.style.transform = `rotate(${degLeap}deg)`;
  }

  updateSubdials();
  setInterval(updateSubdials, 1000/12);
})();
</script>

  const chimePause = 0;

  let sonnerieRunToken = 0;
  window.__strikeSilence = window.__strikeSilence || false;
  window.__sonnerieMode = window.__sonnerieMode || 'grande';
  let lastMinuteChecked = new Date().getMinutes();
  let chimeArmed = false;

  const clockChimeSrc  = document.getElementById('clockChimeSrc')?.src || '';
  const clockDingSrc   = document.getElementById('clockDingSrc')?.src || '';
  const clockDongSrc   = document.getElementById('clockDongSrc')?.src || '';

  const dingPool = [];
  const dongPool = [];
  const chimePool = [];
  let di = 0, doI = 0, ci = 0;

  function make(src) {
    const a = new Audio(src);
    a.preload = 'auto';
    a.playsInline = true;
    return a;
  }

  async function warm(a) {
    try {
      a.volume = 0.01;
      const p = a.play();
      if (p && typeof p.then === 'function') {
        await p.catch(() => {});
      }
      await new Promise(r => setTimeout(r, 80));
      a.pause();
      try { a.currentTime = 0; } catch (e) {}
      a.volume = 1;
    } catch (e) {}
  }

  function next(pool, type) {
    if (type === 'ding') {
      const i = di; di = (di + 1) % pool.length; return pool[i];
    }
    if (type === 'dong') {
      const i = doI; doI = (doI + 1) % pool.length; return pool[i];
    }
    const i = ci; ci = (ci + 1) % pool.length; return pool[i];
  }

  async function arm() {
    if (chimeArmed) return;
    chimeArmed = true;

    for (let i = 0; i < 4; i++) dingPool.push(make(clockDingSrc));
    for (let i = 0; i < 12; i++) dongPool.push(make(clockDongSrc));
    for (let i = 0; i < 2; i++) chimePool.push(make(clockChimeSrc));

    for (const a of [...dingPool, ...dongPool, ...chimePool]) {
      await warm(a);
    }

    startLoop();
  }

  document.addEventListener('pointerdown', arm, { once: true });
  document.addEventListener('touchstart', arm, { once: true });
  document.addEventListener('click', arm, { once: true });

  async function play(a) {
    try {
      a.pause();
      a.currentTime = 0;
      const p = a.play();
      if (p && typeof p.then === 'function') {
        await p.catch(() => {});
      }
    } catch (e) {}
  }

  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  function h12(h) {
    return ((h + 11) % 12) + 1;
  }

  async function playDingdongCount(n, token) {
    if (window.__strikeSilence) return;
    for (let i = 0; i < n; i++) {
      if (token !== sonnerieRunToken) return;
      if (typeof window.__consumeSonnerieReserve === 'function') window.__consumeSonnerieReserve('dingdong', 1);
      playDingdongOnce();
      await sleep(dingdongCycle);
    }
  }

  async function playQuarter(n, token) {
    if (window.__strikeSilence) return;
    for (let i = 0; i < n; i++) {
      if (token !== sonnerieRunToken) return;
      if (typeof window.__consumeSonnerieReserve === 'function') window.__consumeSonnerieReserve('dingdong', 1);
      await play(next(dingPool, 'ding'));
      if (i < n - 1) await sleep(dingdongCycle);
    }
  }

  async function playHour(h, token) {
    if (window.__strikeSilence) return;
    if (typeof window.__consumeSonnerieReserve === 'function') window.__consumeSonnerieReserve('chime', 1);
    await play(next(chimePool, 'chime'));
    await sleep(chimeDuration + chimePause);

    if (token !== sonnerieRunToken) return;

    const count = h12(h);
    for (let i = 0; i < count; i++) {
      if (token !== sonnerieRunToken) return;
      if (typeof window.__consumeSonnerieReserve === 'function') window.__consumeSonnerieReserve('dong', 1);
      await play(next(dongPool, 'dong'));
      if (i < count - 1) await sleep(dongCycle);
    }
  }

  function check() {
    if (window.__strikeSilence) return;
    const now = new Date();
    const m = now.getMinutes();
    const h = now.getHours();

    if (m === lastMinuteChecked) return;

    const prev = lastMinuteChecked;
    lastMinuteChecked = m;

    function crossed(t) {
      if (prev < m) return t > prev && t <= m;
      return t > prev || t <= m;
    }

    const token = ++sonnerieRunToken;

    if (crossed(0)) playHour(h, token);
    else if (crossed(15)) playQuarter(1, token);
    else if (crossed(30)) playQuarter(2, token);
    else if (crossed(45)) playQuarter(3, token);
  }


  function stopAutoNow() {
    sonnerieRunToken++;
    for (const a of [...dingPool, ...dongPool, ...chimePool]) {
      try { a.pause(); a.currentTime = 0; } catch (e) {}
    }
  }

  window.__stopAutoChimeNow = stopAutoNow;
  window.__setStrikeSilence = function(v){
    window.__strikeSilence = !!v;
    if (window.__strikeSilence) stopAutoNow();
  };


  window.__setSonnerieMode = function(mode){
    window.__sonnerieMode = (mode === 'petite') ? 'petite' : 'grande';
  };

  function startLoop() {
    function loop() {
      if (!chimeArmed) return;
      check();
      requestAnimationFrame(loop);
    }
    loop();
  }
})();
</script>

(function(){
  const viewer = document.getElementById('viewer');
  const stageShell = document.getElementById('stageShell');
  const stage = document.getElementById('stage');
  if (!viewer || !stageShell || !stage) return;

  const stageW = 3784;
  const stageH = 2838;

  function isTouchLike(){
    return ('ontouchstart' in window) || (navigator.maxTouchPoints || 0) > 0;
  }

  function applyPcFit(){
    if (isTouchLike()) return; // leave phones/tablets alone

    // Neutralize any old zoom-mode / drag-fit assumptions on desktop start
    document.body.classList.remove('pc-zoom-active', 'dragging');
    viewer.classList.remove('zoom-mode');

    const vw = viewer.clientWidth || window.innerWidth;
    const vh = viewer.clientHeight || window.innerHeight;

    // Stable single fit factor with a gentle desktop boost
    const fit = Math.min(vw / stageW, vh / stageH);
    const desktopBoost = 1.18;
    const scale = fit * desktopBoost;

    stageShell.style.width = stageW + 'px';
    stageShell.style.height = stageH + 'px';
    stageShell.style.transformOrigin = 'center center';
    stageShell.style.transform = 'scale(' + scale + ')';

    // Keep stage itself unscaled internally
    stage.style.transform = '';
  }

  window.addEventListener('resize', applyPcFit, {passive:true});
  window.addEventListener('orientationchange', applyPcFit, {passive:true});
  document.addEventListener('DOMContentLoaded', applyPcFit);
  setTimeout(applyPcFit, 50);
  setTimeout(applyPcFit, 250);
})();

<script>
(function(){
  const dongSrc = document.getElementById('clockDongSrc');
  const dingdongSrc = document.getElementById('clockDingSrc');
  const minuteSrc = document.getElementById('clockMinuteSrc');
  if(!dongSrc || !dingdongSrc || !minuteSrc) return;

  let lastHandledSeq = 0;
  let lastStartTime = 0;
  let repeaterToken = 0;
  let isRunning = false;
  let warmed = false;

  const dongPool = [];
  const dingdongPool = [];
  const minutePool = [];

  function buildPool(src, count, arr){
    for(let i=0;i<count;i++){
      const a = new Audio(src);
      a.preload = 'auto';
      a.playsInline = true;
      arr.push(a);
    }
  }

  buildPool(dongSrc.src, 14, dongPool);
  buildPool(dingdongSrc.src, 4, dingdongPool);
  buildPool(minuteSrc.src, 16, minutePool);

  function pick(arr){
    for(const a of arr){
      if(a.paused || a.ended) return a;
    }
    return arr[0];
  }

  function play(arr){
    const a = pick(arr);
    if(!a) return;
    try{
      a.pause();
      a.currentTime = 0;
      a.volume = 1;
      const p = a.play();
      if(p && p.catch) p.catch(()=>{});
    }catch(e){}
  }

  function warmPool(pool){
    pool.forEach(a=>{
      try{
        a.currentTime = 0;
        a.volume = 0.01;
        const p = a.play();
        if(p && p.catch) p.catch(()=>{});
        setTimeout(()=>{
          try{
            a.pause();
            a.currentTime = 0;
            a.volume = 1;
          }catch(e){}
        }, 20);
      }catch(e){}
    });
  }

  function arm(){
    if(warmed) return;
    warmed = true;
    warmPool(dongPool);
    warmPool(dingdongPool);
    warmPool(minutePool);
  }

  function startRepeater(token){
    const d = new Date();
    const hour12  = (d.getHours() % 12) || 12;
    const minute  = d.getMinutes();
    const quarters = Math.floor(minute / 15);
    const minutes  = minute % 15;

    let delay = 120;
    const DONG_CYCLE = 1350;
    const DINGDONG_CYCLE = 2000;
    const MINUTE_CYCLE = 1000;

    for(let i=0;i<hour12;i++){
      const t = delay;
      setTimeout(()=>{
        if(token !== repeaterToken) return;
        if (typeof window.__consumeSonnerieReserve === 'function') window.__consumeSonnerieReserve('dong', 1);
        play(dongPool);
      }, t);
      delay += DONG_CYCLE;
    }

    for(let i=0;i<quarters;i++){
      const t = delay;
      setTimeout(()=>{
        if(token !== repeaterToken) return;
        if (typeof window.__consumeSonnerieReserve === 'function') window.__consumeSonnerieReserve('dingdong', 1);
        play(dingdongPool);
      }, t);
      delay += DINGDONG_CYCLE;
    }

    for(let i=0;i<minutes;i++){
      const t = delay;
      setTimeout(()=>{
        if(token !== repeaterToken) return;
        if (typeof window.__consumeSonnerieReserve === 'function') window.__consumeSonnerieReserve('ding', 1);
        play(minutePool);
      }, t);
      delay += MINUTE_CYCLE;
    }

    setTimeout(()=>{
      if(token === repeaterToken){
        isRunning = false;
      }
    }, delay + 50);
  }

  function handlePress(seq){
    if (window.__strikeSilence) return;
    if(!seq || seq === lastHandledSeq) return;
    lastHandledSeq = seq;

    const now = Date.now();

    // While running: ignore further presses completely
    if(isRunning){
      return;
    }

    lastStartTime = now;

    repeaterToken++;
    const token = repeaterToken;

    arm();
    isRunning = true;

    setTimeout(()=>{
      startRepeater(token);
    }, 30);
  }

  function stopMinuteRepeater(){
    repeaterToken++;
    isRunning = false;
    [dongPool, dingdongPool, minutePool].forEach(function(pool){
      pool.forEach(function(a){
        try { a.pause(); a.currentTime = 0; } catch(e) {}
      });
    });
  }

  window.__stopMinuteRepeaterNow = stopMinuteRepeater;

  window.addEventListener('z19-press', function(ev){
    const seq = ev && ev.detail ? ev.detail.seq : 0;
    handlePress(seq);
  });
})();
</script>

  function normalizeDeg(deg){
    let d = deg % 360;
    if (d < 0) d += 360;
    return d;
  }

  function fracFromLinearAngle(angle, empty, full){
    return clamp((angle - empty) / (full - empty), 0, 1);
  }

  function fracFromCCWAngle(angle, empty, full){
    const span = empty - full;
    return clamp((empty - angle) / span, 0, 1);
  }

  function angleFromLinearFrac(frac, empty, full){
    return empty + frac * (full - empty);
  }

  function angleFromCCWFrac(frac, empty, full){
    return empty - frac * (empty - full);
  }

  const state = {
    movementFrac: fracFromCCWAngle(MOV_START, MOV_EMPTY, MOV_FULL),
    sonnerieUnits: SONNERIE_CAPACITY * fracFromLinearAngle(SON_START, SON_EMPTY, SON_FULL),
    lastTs: performance.now()
  };

  function applyHands(){
    const movAngle = angleFromCCWFrac(state.movementFrac, MOV_EMPTY, MOV_FULL);
    const sonFrac = clamp(state.sonnerieUnits / SONNERIE_CAPACITY, 0, 1);
    const sonAngle = angleFromLinearFrac(sonFrac, SON_EMPTY, SON_FULL);

    reMo.style.transform = 'rotate(' + movAngle.toFixed(3) + 'deg)';
    reSo.style.transform = 'rotate(' + normalizeDeg(sonAngle).toFixed(3) + 'deg)';
  }

  reMo.style.transition = 'transform 0ms linear';
  reSo.style.transition = 'transform 0ms linear';
  applyHands();

  window.__reserveModel = {
    state,
    clamp,
    applyHands,
    // one winding step = +25° toward FULL on each retrograde scale
    movementStepFrac: 25 / (MOV_EMPTY - MOV_FULL),
    sonnerieStepUnits: SONNERIE_CAPACITY * (25 / (SON_FULL - SON_EMPTY))
  };

  window.__consumeSonnerieReserve = function(kind, count){
    const n = Number(count || 1);
    const cost = (COST[kind] || 0) * n;
    if (!cost) return;
    state.sonnerieUnits = clamp(state.sonnerieUnits - cost, 0, SONNERIE_CAPACITY);
    applyHands();
  };

  if (typeof window.__setStrikeSilence === 'function' && !window.__reserveHookedAuto) {
    window.__reserveHookedAuto = true;
    setTimeout(function(){
      try {
        if (window.playDingdongOnce && !window.__wrappedPlayDingdongOnce){
          const orig = window.playDingdongOnce;
          window.playDingdongOnce = function(){
            window.__consumeSonnerieReserve('dingdong', 1);
            return orig.apply(this, arguments);
          };
          window.__wrappedPlayDingdongOnce = true;
        }
      } catch(e){}
    }, 0);
  }

  if (!window.__reserveRepeaterHookInstalled) {
    window.__reserveRepeaterHookInstalled = true;
    window.__reserveCount = function(kind){ window.__consumeSonnerieReserve(kind, 1); };
  }

  function loop(ts){
    const dt = Math.max(0, (ts - state.lastTs) / 1000);
    state.lastTs = ts;
    state.movementFrac = clamp(state.movementFrac - (dt / MOVEMENT_RUNTIME_SECONDS), 0, 1);
    applyHands();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>

<script>
/* =========================================================
   CHRONOGRAPH SYSTEM V1.51
   ---------------------------------------------------------
   Prepared and wired:
   - L27 = chrono central seconds (main)
   - L26 = chrono central split-seconds (prepared, follows main until split button exists)
   - L22 = chrono 30-minute counter
   - L21 = chrono 12-hour retrograde counter
   - Z14 = start / stop
   - Z15 = flyback
========================================================= */
(function(){
  const secMain  = document.getElementById('L27');
  const secSplit = document.getElementById('L26');
  const minHand  = document.getElementById('L22');
  const hourHand = document.getElementById('L21');
  const btnStart = document.getElementById('HIT_Z14');
  const btnFly   = document.getElementById('HIT_Z15');

  if(!secMain || !secSplit || !minHand || !hourHand) return;

  /* ======= calibrated hour retrograde values ======= */
  const HOUR_START_DEG = -112.5;   // 0 hours
  const HOUR_END_DEG   = -245.5;   // 12 hours
  const HOUR_MAX       = 12;
  const HOUR_SNAP_MS   = 260;

  /* ======= chrono scale values ======= */
  const SEC_REV_MS = 60 * 1000;           // 60 s / revolution
  const MIN_REV_MS = 30 * 60 * 1000;      // 30 min / revolution
  const SPLIT_VISIBLE_OFFSET_DEG = 0.8;   // tiny visibility helper while frozen
  const SPLIT_CATCHUP_MS = 320;           // smoother mechanical catch-up

  /* ======= state ======= */
  const state = {
    running: false,
    startMs: 0,
    storedMs: 0,

    splitFrozen: false,
    splitFrozenMs: 0,
    splitCatchupActive: false,
    splitCatchupStartMs: 0,
    splitCatchupFromDeg: 0,

    hourSnapActive: false,
    hourSnapStartMs: 0,
    hourSnapFromDeg: HOUR_START_DEG,
    restartAfterSnap: false
  };

  function clamp(v, min, max){
    return Math.max(min, Math.min(max, v));
  }

  function nowMs(){
    return performance.now();
  }

  function getElapsedMs(){
    return state.running ? (state.storedMs + (nowMs() - state.startMs)) : state.storedMs;
  }

  function setAngle(el, deg){
    el.style.transform = 'rotate(' + deg + 'deg)';
  }

  function hourAngleFromElapsed(elapsedMs){
    const hoursFloat = (elapsedMs / 3600000) % HOUR_MAX;
    const frac = clamp(hoursFloat / HOUR_MAX, 0, 1);
    return HOUR_START_DEG + (HOUR_END_DEG - HOUR_START_DEG) * frac;
  }

  function startChrono(){
    if(state.running) return;
    state.running = true;
    state.startMs = nowMs();
  }

  function stopChrono(){
    if(!state.running) return;
    state.storedMs = getElapsedMs();
    state.running = false;
  }

  function toggleStartStop(){
    if(state.running) stopChrono();
    else startChrono();
  }

  function resetChrono(){
    state.running = false;
    state.storedMs = 0;
    state.splitFrozen = false;
    state.splitFrozenMs = 0;
    state.splitCatchupActive = false;
    state.hourSnapActive = false;
    state.restartAfterSnap = false;

    setAngle(secMain, 0);
    setAngle(secSplit, 0);
    setAngle(minHand, 0);
    setAngle(hourHand, HOUR_START_DEG);
  }

  function startHourSnap(fromDeg, restartAfter){
    state.hourSnapActive = true;
    state.hourSnapStartMs = nowMs();
    state.hourSnapFromDeg = fromDeg;
    state.restartAfterSnap = !!restartAfter;
  }

  function flybackChrono(){
    const elapsed = getElapsedMs();
    const currentHourDeg = hourAngleFromElapsed(elapsed);
    const restart = state.running;

    state.running = false;
    state.storedMs = 0;
    state.splitFrozen = false;
    state.splitFrozenMs = 0;

    setAngle(secMain, 0);
    setAngle(secSplit, 0);
    setAngle(minHand, 0);
    startHourSnap(currentHourDeg, restart);
  }

  /* ======= split API prepared for later button ======= */
  function splitFreeze(){
    if(!state.running) return;
    if(state.splitFrozen) return;
    state.splitFrozen = true;
    state.splitFrozenMs = getElapsedMs();
    state.splitCatchupActive = false;
  }

  function splitCatchUp(){
    if(!state.splitFrozen) return;
    const frozenDeg = ((state.splitFrozenMs % SEC_REV_MS) / SEC_REV_MS) * 360 + SPLIT_VISIBLE_OFFSET_DEG;
    state.splitCatchupActive = true;
    state.splitCatchupStartMs = nowMs();
    state.splitCatchupFromDeg = frozenDeg;
    state.splitFrozen = false;
  }

  window.__chronoStart = startChrono;
  window.__chronoStop = stopChrono;
  window.__chronoToggleStartStop = toggleStartStop;
  window.__chronoReset = resetChrono;
  window.__chronoFlyback = flybackChrono;
  window.__chronoSplitFreeze = splitFreeze;
  window.__chronoSplitCatchUp = splitCatchUp;

  /* ======= bind buttons ======= */
  function bindChronoButton(btn, fn){
    if(!btn) return;
    let touchHandled = false;
    let mouseHandled = false;

    btn.addEventListener('touchstart', function(e){
      touchHandled = true;
      e.preventDefault();
      e.stopPropagation();
    }, {passive:false});

    btn.addEventListener('touchend', function(e){
      e.preventDefault();
      e.stopPropagation();
      fn();
      setTimeout(()=>{ touchHandled = false; }, 0);
    }, {passive:false});

    btn.addEventListener('pointerdown', function(e){
      e.preventDefault();
      e.stopPropagation();
    }, {passive:false});

    btn.addEventListener('pointerup', function(e){
      e.preventDefault();
      e.stopPropagation();
      if(e.pointerType === 'mouse' || e.pointerType === 'pen'){
        mouseHandled = true;
        fn();
        setTimeout(()=>{ mouseHandled = false; }, 450);
      }
    }, {passive:false});

    btn.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      if(mouseHandled) return;
      if(!touchHandled) fn();
    }, {passive:false});
  }

  bindChronoButton(btnStart, function(){
    if(!state.running && state.storedMs > 0){
      resetChrono();   // 3rd press = reset
    } else {
      toggleStartStop(); // start / stop
    }
  });

  bindChronoButton(btnFly, function(){
    if(!state.running) return;
    if(!state.splitFrozen){
      splitFreeze();   // split
    } else {
      splitCatchUp();  // catch-up
    }
  });

  /* ======= animation loop ======= */
  function animate(){
    const elapsed = getElapsedMs();

    /* central chrono seconds */
    const secDeg = ((elapsed % SEC_REV_MS) / SEC_REV_MS) * 360;
    setAngle(secMain, secDeg);

    /* split-seconds */
    const mainDeg = secDeg;

    if(state.splitFrozen){
      const frozenDeg = ((state.splitFrozenMs % SEC_REV_MS) / SEC_REV_MS) * 360 + SPLIT_VISIBLE_OFFSET_DEG;
      setAngle(secSplit, frozenDeg);
    } else if(state.splitCatchupActive){
      const t = clamp((nowMs() - state.splitCatchupStartMs) / SPLIT_CATCHUP_MS, 0, 1);
      // mechanical feel: tiny hesitation, then quicker catch-up
      const eased = (t < 0.18)
        ? (0.10 * (t / 0.18))
        : (0.10 + 0.90 * (1 - Math.pow(1 - ((t - 0.18) / 0.82), 3)));
      const currentMainDeg = mainDeg;
      let delta = currentMainDeg - state.splitCatchupFromDeg;
      while(delta < 0) delta += 360;
      const catchDeg = state.splitCatchupFromDeg + delta * eased;
      setAngle(secSplit, catchDeg);
      if(t >= 1){
        state.splitCatchupActive = false;
      }
    } else {
      setAngle(secSplit, mainDeg);
    }

    /* 30-minute counter */
    const minDeg = ((elapsed % MIN_REV_MS) / MIN_REV_MS) * 360;
    setAngle(minHand, minDeg);

    /* 12-hour retrograde counter */
    if(state.hourSnapActive){
      const t = clamp((nowMs() - state.hourSnapStartMs) / HOUR_SNAP_MS, 0, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      const deg = state.hourSnapFromDeg + (HOUR_START_DEG - state.hourSnapFromDeg) * eased;
      setAngle(hourHand, deg);

      if(t >= 1){
        state.hourSnapActive = false;
        setAngle(hourHand, HOUR_START_DEG);
        if(state.restartAfterSnap){
          state.startMs = nowMs();
          state.running = true;
          state.restartAfterSnap = false;
        }
      }
    } else {
      setAngle(hourHand, hourAngleFromElapsed(elapsed));
    }

    requestAnimationFrame(animate);
  }

  /* initial state */
  resetChrono();
  requestAnimationFrame(animate);
})();
</script>

<script>
(function(){
  const eqMinDeg = 112;
  const eqMaxDeg = 240;
  const eqUpdateMs = 10000;

  function dayOfYearFraction(date){
    const start = new Date(date.getFullYear(), 0, 0);
    return (date - start) / 86400000;
  }

  function getEquationOfTimeMinutes(date){
    const n = dayOfYearFraction(date);
    const B = 2 * Math.PI * (n - 81) / 364;
    return 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
  }

  function setEqPointerFromMinutes(minutes){
    const el = document.getElementById('L15');
    if(!el) return;
    const clamped = Math.max(-15, Math.min(15, minutes));
    const angle = eqMaxDeg - ((clamped + 15) / 30) * (eqMaxDeg - eqMinDeg);
    el.style.transform = 'rotate(' + angle + 'deg)';
    el.dataset.eqAngle = String(angle);
    el.dataset.eqMinutes = String(minutes);
  }

  function updateEqPointer(){
    setEqPointerFromMinutes(getEquationOfTimeMinutes(new Date()));
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', updateEqPointer, {once:true});
  } else {
    updateEqPointer();
  }
  window.addEventListener('load', updateEqPointer, {once:true});
  setTimeout(updateEqPointer, 150);
  setTimeout(updateEqPointer, 800);
  setInterval(updateEqPointer, eqUpdateMs);
})();
</script>

  ];

  function getAngleDeg(el){
    const t = getComputedStyle(el).transform;
    if(!t || t === 'none') return 0;

    const m = t.match(/matrix\(([^)]+)\)/);
    if(m){
      const v = m[1].split(',').map(Number);
      const a = v[0], b = v[1];
      return Math.atan2(b, a) * 180 / Math.PI;
    }

    const m3 = t.match(/matrix3d\(([^)]+)\)/);

      const v = m3[1].split(',').map(Number);

      return Math.atan2(b, a) * 180 / Math.PI;
    }

    return 0;
  }

  function rgba(alpha){
    return 'rgba(0,0,0,' + alpha.toFixed(3) + ')';

  function applyShadow(el, cfg){

(function(){
  function pxNum(v){
    if(!v) return 0;
    const n = parseFloat(String(v).replace('px','').trim());
    return isNaN(n) ? 0 : n;
  }

  function getOriginPair(el){
    const cs = getComputedStyle(el);
    const parts = (cs.transformOrigin || '').split(' ');
    return {
      ox: pxNum(parts[0]),
      oy: pxNum(parts[1])
    };
  }

  function getAngleDeg(el){
    const t = getComputedStyle(el).transform;
    if(!t || t === 'none') return 0;

    const m = t.match(/matrix\(([^)]+)\)/);
    if(m){
      const v = m[1].split(',').map(Number);
      return Math.atan2(v[1], v[0]) * 180 / Math.PI;
    }

    const m3 = t.match(/matrix3d\(([^)]+)\)/);
    if(m3){
      const v = m3[1].split(',').map(Number);
      return Math.atan2(v[1], v[0]) * 180 / Math.PI;
    }

    return 0;
  }

  function applyShadow(el, cfg){
    const rad = getAngleDeg(el) * Math.PI / 180;
    const dx1 = Math.sin(rad) * cfg.dist + cfg.biasX;
    const dy1 = cfg.baseY;
    const dx2 = dx1 * cfg.scale2;

      'drop-shadow(' + dx2.toFixed(2) + 'px ' + dy2.toFixed(2) + 'px ' + cfg.blur2 + 'px rgba(0,0,0,' + cfg.op2 + '))';
  }

  function matchTopReserveHand(el){
    const cs = getComputedStyle(el);
    const left = pxNum(cs.left);
    const top  = pxNum(cs.top);
    const width = pxNum(cs.width);
    const height = pxNum(cs.height);
    const o = getOriginPair(el);

    const isTopArea = top > 700 && top < 820;
    const isLeftSide = left > 1100 && left < 1300;

      if (isLeftSide && isTopArea) return { dist: 8, baseY: 5, biasX: -1.0, blur1: 2.6, op1: 0.20, scale2: 0.45, blur2: 3.4, op2: 0.12 };
      if (isRightSide && isTopArea) return { dist: 8, baseY: 5, biasX:  1.0, blur1: 2.6, op1: 0.20, scale2: 0.45, blur2: 3.4, op2: 0.12 };
    }

    return null;
  }

    for(const el of els){
      const cfg = matchTopReserveHand(el);
      if(cfg) applyShadow(el, cfg);

    const rad = getAngleDeg(el) * Math.PI / 180;
    const dx1 = Math.sin(rad) * cfg.dist + cfg.biasX;
    const dy1 = cfg.baseY;
    const dx2 = dx1 * cfg.scale2;
    const dy2 = dy1 * 0.6;

    const existing = el.style.filter ? el.style.filter + ' ' : '';
    const extra =
      'drop-shadow(' + dx1.toFixed(2) + 'px ' + dy1.toFixed(2) + 'px ' + cfg.blur1 + 'px rgba(0,0,0,' + cfg.op1 + ')) ' +
      'drop-shadow(' + dx2.toFixed(2) + 'px ' + dy2.toFixed(2) + 'px ' + cfg.blur2 + 'px rgba(0,0,0,' + cfg.op2 + '))';
    if(!el.dataset.gmtShadowApplied){
      el.style.filter = existing + extra;
      el.dataset.gmtShadowApplied = '1';
    }
  }

  function initGMTShadows(){
    const els = document.querySelectorAll('.layer');
    for(const el of els){
      const cs = getComputedStyle(el);
      const left = pxNum(cs.left);
      const top  = pxNum(cs.top);
      const width = pxNum(cs.width);
      const height = pxNum(cs.height);
      const o = getOriginPair(el);

      const isGMTShape =
        Math.abs(o.ox - 22) < 1.5 &&
        Math.abs(o.oy - 110) < 1.5 &&
        width > 40 && width < 50 &&
        height > 145 && height < 160;

      if(!isGMTShape) continue;

      const isLeftGMT  = left > 1240 && left < 1290 && top > 1640 && top < 1675;
      const isRightGMT = left > 2040 && left < 2090 && top > 1650 && top < 1685;

      if(isLeftGMT){
        applyShadow(el, { dist: 6, baseY: 4.5, biasX: -0.8, blur1: 2.2, op1: 0.17, scale2: 0.45, blur2: 3.0, op2: 0.10 });
      } else if(isRightGMT){
        applyShadow(el, { dist: 6, baseY: 4.5, biasX: 0.8, blur1: 2.2, op1: 0.17, scale2: 0.45, blur2: 3.0, op2: 0.10 });
      }
    }
  }

  initGMTShadows();
})();

<script>
(function(){
  function pxNum(v){
    if(!v) return 0;
    const n = parseFloat(String(v).replace('px','').trim());
    return isNaN(n) ? 0 : n;
  }

  function getOriginPair(el){
    const cs = getComputedStyle(el);
    const parts = (cs.transformOrigin || '').split(' ');
    return {
      ox: pxNum(parts[0]),
      oy: pxNum(parts[1])
    };
  }

  function getAngleDeg(el){
    const t = getComputedStyle(el).transform;
    if(!t || t === 'none') return 0;

    const m = t.match(/matrix\(([^)]+)\)/);
    if(m){
      const v = m[1].split(',').map(Number);
      return Math.atan2(v[1], v[0]) * 180 / Math.PI;
    }

    const m3 = t.match(/matrix3d\(([^)]+)\)/);
    if(m3){
      const v = m3[1].split(',').map(Number);
      return Math.atan2(v[1], v[0]) * 180 / Math.PI;
    }

    return 0;
  }

  function applyExtraShadow(el, cfg){
    const rad = getAngleDeg(el) * Math.PI / 180;
    const dx1 = Math.sin(rad) * cfg.dist + cfg.biasX;
    const dy1 = cfg.baseY;
    const dx2 = dx1 * cfg.scale2;
    const dy2 = dy1 * 0.6;

    const extra =
      'drop-shadow(' + dx1.toFixed(2) + 'px ' + dy1.toFixed(2) + 'px ' + cfg.blur1 + 'px rgba(0,0,0,' + cfg.op1 + ')) ' +
      'drop-shadow(' + dx2.toFixed(2) + 'px ' + dy2.toFixed(2) + 'px ' + cfg.blur2 + 'px rgba(0,0,0,' + cfg.op2 + '))';

    if(!el.dataset.chronoSmallShadowApplied){
      el.style.filter = (el.style.filter ? el.style.filter + ' ' : '') + extra;
      el.dataset.chronoSmallShadowApplied = '1';
    }
  }

  function initChronoSmallShadows(){
    const els = document.querySelectorAll('.layer');
    for(const el of els){
      const cs = getComputedStyle(el);
      const left = pxNum(cs.left);
      const top  = pxNum(cs.top);
      const width = pxNum(cs.width);
      const height = pxNum(cs.height);
      const o = getOriginPair(el);

      // ch_hour.png | pivot 22,226 | Z2 | Chrono Stunden oben rot
      const isChHour =
        Math.abs(o.ox - 22) < 1.5 &&
        Math.abs(o.oy - 226) < 1.5 &&
        width > 40 && width < 52 &&
        height > 235 && height < 260 &&
        left > 1650 && left < 1685 &&
        top > 470 && top < 490;

      // ch_min.png | pivot 26,118 | Z4 | Chrono Minuten rot rechts
      const isChMin =
        Math.abs(o.ox - 26) < 1.5 &&
        Math.abs(o.oy - 118) < 1.5 &&
        width > 50 && width < 60 &&
        height > 155 && height < 175 &&
        left > 1970 && left < 1995 &&
        top > 1235 && top < 1255;

      if(isChHour){
        applyExtraShadow(el, { dist: 7, baseY: 5, biasX: 0, blur1: 2.5, op1: 0.19, scale2: 0.45, blur2: 3.3, op2: 0.11 });
      } else if(isChMin){
        applyExtraShadow(el, { dist: 6, baseY: 4.5, biasX: 0.6, blur1: 2.4, op1: 0.18, scale2: 0.45, blur2: 3.2, op2: 0.10 });
      }
    }
  }

  initChronoSmallShadows();
})();

<script>
(function(){
  function ensureGlassOverlay(){
    const stage = document.getElementById('stage');
    if(!stage) return null;

    let overlay = document.getElementById('glassOverlay');
    if(overlay) return overlay;

    overlay = document.createElement('div');
    overlay.id = 'glassOverlay';

    const topGlow = document.createElement('div');
    topGlow.id = 'glassTopGlow';

    const sweepMain = document.createElement('div');
    sweepMain.className = 'glassSweep';
    sweepMain.id = 'glassSweepMain';

    const sweepMini = document.createElement('div');
    sweepMini.className = 'glassSweep';
    sweepMini.id = 'glassSweepMini';

    overlay.appendChild(topGlow);
    overlay.appendChild(sweepMain);
    overlay.appendChild(sweepMini);
    stage.appendChild(overlay);
    return overlay;
  }

  function randomBetween(min, max){
    return min + Math.random() * (max - min);
  }

  function runSweep(el, opts){
    const angle = opts.angle;
    const width = opts.width;
    const peak = opts.peak;

    el.style.width = width + '%';
    el.animate([
      {
        opacity: 0,
        transform: 'translateX(-8%) rotate(' + angle + 'deg)'
      },
      {
        opacity: peak,
        transform: 'translateX(260%) rotate(' + angle + 'deg)',
        offset: 0.5
      },
      {
        opacity: 0,
        transform: 'translateX(530%) rotate(' + angle + 'deg)'
      }
    ], {
      duration: opts.duration,
      easing: 'ease-in-out'
    });
  }

  function loopGlass(){
    const main = document.getElementById('glassSweepMain');
    const mini = document.getElementById('glassSweepMini');
    if(!main || !mini) return;

    const angle = Math.random() < 0.5 ? 22 : -22;

    runSweep(main, {
      angle: angle,
      width: 20,
      peak: 0.72,
      duration: 1600
    });

    if(Math.random() < 0.38){
      setTimeout(function(){
        runSweep(mini, {
          angle: angle + (Math.random() < 0.5 ? -3 : 3),
          width: 13,
          peak: 0.42,
          duration: 1600
        });
      }, 300);
    }

    const next = randomBetween(5000, 8000);
    setTimeout(loopGlass, next);
  }

  window.addEventListener('load', function(){
    ensureGlassOverlay();
    setTimeout(loopGlass, 1200);
  });
})();
</script>
<script id="v39-info-guard">
(function(){
  function isInfoTarget(t){
    return !!(t && t.closest && t.closest('#infoBar'));
  }
  ['pointerdown','touchstart','mousedown'].forEach(function(type){
    document.addEventListener(type, function(e){
      if(isInfoTarget(e.target)){
        if (typeof e.stopPropagation === 'function') e.stopPropagation();
      }
    }, true);
  });
})();
</script>
<script id="info-ui-js">
(function(){
  let infoVisible = false;
  let currentLang = "en";   // remembers last chosen language

  const overlay = document.getElementById("infoOverlay");
  const hitInfo = document.getElementById("HIT_INFO_STAGE");
  const hitEn = document.getElementById("HIT_EN_STAGE");
  const hitDe = document.getElementById("HIT_DE_STAGE");
  const hitJp = document.getElementById("HIT_JP_STAGE");
  const labelInfo = document.getElementById("infoToggle");
  const labelEn = document.getElementById("infoEn");
  const labelDe = document.getElementById("infoDe");
  const labelJp = document.getElementById("infoJp");
  // Important: do NOT rewrite the viewport meta on iPhone.
  // Safari can keep the zoom behavior in a modified state even after unlock.
  // We block only active pinch gestures while the info overlay is visible.

  if(!overlay || !hitInfo || !hitEn || !hitDe || !hitJp || !labelInfo || !labelEn || !labelDe || !labelJp) return;

  const srcEn = overlay.getAttribute("data-src-en");
  const srcDe = overlay.getAttribute("data-src-de");
  const srcJp = overlay.getAttribute("data-src-jp");

  // Preload and decode off-DOM early; keep just ONE stage overlay element live.
  const cache = {
    en: new Image(),
    de: new Image(),
    jp: new Image()
  };
  const cacheReady = { en: Promise.resolve(), de: Promise.resolve(), jp: Promise.resolve() };

  function warmOverlayImage(img, src, priority){
    img.decoding = 'async';
    try { img.fetchPriority = priority; } catch(e) {}
    img.src = src;
    if (img.decode) {
      return img.decode().catch(function(){});
    }
    return new Promise(function(resolve){
      if (img.complete) return resolve();
      img.onload = function(){ resolve(); };
      img.onerror = function(){ resolve(); };
    });
  }

  function warmInfoOverlays(){
    cacheReady.en = warmOverlayImage(cache.en, srcEn, 'high');
    cacheReady.de = warmOverlayImage(cache.de, srcDe, 'high');
    cacheReady.jp = warmOverlayImage(cache.jp, srcJp, 'high');
  }

  if (document.readyState === 'complete') {
    warmInfoOverlays();
  } else {
    window.addEventListener('load', function(){
      if (window.requestIdleCallback) {
        requestIdleCallback(warmInfoOverlays, { timeout: 1200 });
      } else {
        setTimeout(warmInfoOverlays, 250);
      }
    }, { once:true });
  }

  function isMobileTouch(){
    return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
  }

  let pinchBlockEnabled = false;

  function stopPinchWhileInfo(e){
    if(!pinchBlockEnabled || !isMobileTouch()) return;
    if((e && e.touches && e.touches.length > 1) || e.type === "gesturestart" || e.type === "gesturechange"){
      stopEvent(e);
    }
  }

  function lockMobileZoom(){
    if(pinchBlockEnabled || !isMobileTouch()) return;
    document.addEventListener('touchmove', stopPinchWhileInfo, {passive:false, capture:true});
    document.addEventListener('gesturestart', stopPinchWhileInfo, {passive:false, capture:true});
    document.addEventListener('gesturechange', stopPinchWhileInfo, {passive:false, capture:true});
    pinchBlockEnabled = true;
  }

  function unlockMobileZoom(){
    if(!pinchBlockEnabled) return;
    document.removeEventListener('touchmove', stopPinchWhileInfo, {capture:true});
    document.removeEventListener('gesturestart', stopPinchWhileInfo, {capture:true});
    document.removeEventListener('gesturechange', stopPinchWhileInfo, {capture:true});
    pinchBlockEnabled = false;
  }

  function stopEvent(e){
    if(!e) return;
    if (typeof e.preventDefault === "function") e.preventDefault();
    if (typeof e.stopPropagation === "function") e.stopPropagation();
    if (typeof e.stopImmediatePropagation === "function") e.stopImmediatePropagation();
  }

  function flash(el){
    if(!el) return;
    el.classList.remove('infoFlash');
    void el.offsetWidth;
    el.classList.add('infoFlash');
    setTimeout(function(){ el.classList.remove('infoFlash'); }, 220);
  }

  function applyButtons(){
    labelInfo.textContent = infoVisible ? "INFO: OFF" : "INFO";
    labelInfo.classList.toggle("active", infoVisible);
    labelEn.classList.toggle("active", infoVisible && currentLang === "en");
    labelDe.classList.toggle("active", infoVisible && currentLang === "de");
    labelJp.classList.toggle("active", infoVisible && currentLang === "jp");
  }

  function currentSrc(){
    if(currentLang === "de") return srcDe;
    if(currentLang === "jp") return srcJp;
    return srcEn;
  }

  function showCurrentOverlay(){
    const src = currentSrc();
    if (!src) return;
    const langKey = currentLang === "de" ? "de" : (currentLang === "jp" ? "jp" : "en");
    Promise.resolve(cacheReady[langKey]).finally(function(){
      if (overlay.src !== src) overlay.src = src;
      overlay.style.setProperty("display", "block", "important");
      overlay.classList.remove("infoCue");
      void overlay.offsetWidth;
      overlay.classList.add("infoCue");
      infoVisible = true;

<script id="m77_perfect_sync">
(function(){

  const map = {
    "HIT_Z16_TEST":"K1_btn",
    "HIT_Z14":"K2_btn",
    "HIT_Z15":"K3_btn",
    "hit_gmt_plus":"K4_btn",
    "hit_gmt_minus":"K5_btn",
    "HIT_Z19_TEST":"K6_btn",
    "HIT_Z20_TEST":"K7_btn"
  };

  const lock = {};

  function getGlow(btnId){
    return document.getElementById(btnId + "_glow");
  }

  function ensureGlow(btnId){
    let glow = getGlow(btnId);
    const btn = document.getElementById(btnId);
    if(!btn) return null;

    if(!glow){
      glow = document.createElement("div");
      glow.id = btnId + "_glow";
      btn.insertAdjacentElement("afterend", glow);

      const cs = window.getComputedStyle(btn);

      glow.style.position = "absolute";
      glow.style.left = cs.left;
      glow.style.top = cs.top;
      glow.style.width = cs.width;
      glow.style.height = cs.height;
      glow.style.zIndex = (parseInt(cs.zIndex)||115)+1;
      glow.style.pointerEvents = "none";
      glow.style.background = "rgba(120,0,0,0.42)";
      glow.style.webkitMaskImage = 'url("' + btn.src + '")';
      glow.style.maskImage = 'url("' + btn.src + '")';
      glow.style.webkitMaskSize = "100% 100%";
      glow.style.maskSize = "100% 100%";
      glow.style.opacity = "0";
    }
    return glow;
  }

  function press(btnId){
    if(lock[btnId]) return;
    lock[btnId] = true;

    const btn = document.getElementById(btnId);
    const glow = ensureGlow(btnId);
    if(!btn || !glow) return;

    // RESET
    btn.classList.remove("press-stage1","press-stage2");
    glow.style.opacity = "0";

    // Stage 1 (press start)
    setTimeout(()=>{
      glow.style.opacity = "1";
      btn.classList.add("press-stage1");
    },0);

    // Stage 2 (both disappear EXACT same moment)
    setTimeout(()=>{
      glow.style.opacity = "0";
      btn.classList.remove("press-stage1");
      btn.classList.add("press-stage2");
    },120);

    // Restore (both return same moment)
    setTimeout(()=>{
      btn.classList.remove("press-stage2");
      glow.style.opacity = "0";
      lock[btnId] = false;
    },300);
  }

  function hook(hitId, btnId){
    const el = document.getElementById(hitId);
    if(!el) return;

    ensureGlow(btnId);

    const start = ()=>{
      press(btnId);
    };

    el.addEventListener("pointerdown", start, {capture:true});
    el.addEventListener("mousedown", start, {capture:true});
    el.addEventListener("touchstart", start, {capture:true, passive:true});
  }

  window.addEventListener("DOMContentLoaded", ()=>{
    Object.entries(map).forEach(([h,b])=>hook(h,b));
  });

})();

})();

<script id="m106_crown_step_on_reserve_model">
(function(){
  function init(){
    const hit = document.getElementById('crown_hit');
    const overlay = document.getElementById('crown_overlay');
    const reserve = window.__reserveModel;
    if(!hit || !overlay || !reserve) return;

    let dragging = false;
    let activePointerId = null;
  let inputMode = 'touch';
    let mouseDragging = false;
    let startY = 0;
    let stepDone = false;
    let cooldown = false;
    let stepCount = 0;

    const MAX_STEPS = 3;
    const STEP_THRESHOLD = 10;
    const STEP_ANIM_MS = 1000;
    const COOLDOWN_MS = 1000;

    let animFrame = null;
    let animStart = 0;
    let fromMov = 0;
    let toMov = 0;
    let fromSon = 0;
    let toSon = 0;

    function show(){ overlay.classList.add('m94_on'); }
    function hide(){ if(!dragging) overlay.classList.remove('m94_on'); }
    function easeLinear(t){ return t; }

    function animateReserveStep(){
      if(animFrame) cancelAnimationFrame(animFrame);

      fromMov = reserve.state.movementFrac;
      fromSon = reserve.state.sonnerieUnits;

      toMov = reserve.clamp(
        fromMov + reserve.movementStepFrac,
        0,
        1
      );
      toSon = reserve.clamp(
        fromSon + reserve.sonnerieStepUnits,
        0,
        300.0
      );

      animStart = performance.now();

      function tick(now){
        const t = Math.min(1, (now - animStart) / STEP_ANIM_MS);
        const eased = easeLinear(t);

        reserve.state.movementFrac = fromMov + (toMov - fromMov) * eased;
        reserve.state.sonnerieUnits = fromSon + (toSon - fromSon) * eased;
        reserve.applyHands();

        if(t < 1){
          animFrame = requestAnimationFrame(tick);
        } else {
          animFrame = null;
          reserve.state.movementFrac = toMov;
          reserve.state.sonnerieUnits = toSon;
          reserve.applyHands();
        }
      }

      animFrame = requestAnimationFrame(tick);
    }

    function maybeDoStep(dy){
      if(!stepDone && !cooldown && dy > STEP_THRESHOLD){
        if(stepCount < MAX_STEPS){
          stepCount += 1;
          animateReserveStep();
        }
        stepDone = true;
        cooldown = true;
        setTimeout(function(){ cooldown = false; }, COOLDOWN_MS);
      }
    }

    function maybeDoPcStep(){
      if(cooldown) return;
      if(stepCount < MAX_STEPS){
        stepCount += 1;
        animateReserveStep();
      }
      stepDone = true;
      cooldown = true;
      setTimeout(function(){ cooldown = false; }, COOLDOWN_MS);
    }

    window.addEventListener('crown-pc-step', function(){
      maybeDoPcStep();
    }, true);

    function onDown(e){
      dragging = true;
      activePointerId = e.pointerId;
      startY = e.clientY;
      stepDone = false;
      show();
      try{ hit.setPointerCapture(e.pointerId); }catch(_){}
      e.preventDefault();
      e.stopPropagation();
    }

    function onMove(e){
      if(!dragging) return;
      if(e.pointerId !== activePointerId) return;

      maybeDoStep(e.clientY - startY);

      e.preventDefault();
      e.stopPropagation();
    }

    function onUp(e){
      if(!dragging) return;
      if(e.pointerId !== activePointerId) return;

      dragging = false;
      activePointerId = null;
      stepDone = false;
      overlay.classList.remove('m94_on');
      try{ hit.releasePointerCapture(e.pointerId); }catch(_){}
      e.preventDefault();
      e.stopPropagation();
    }

    function onMouseDown(e){
      if(e.button !== 0) return;
      mouseDragging = true;
      startY = e.clientY;
      stepDone = false;
      show();
      e.preventDefault();
      e.stopPropagation();
    }

    function onMouseMove(e){
      if(!mouseDragging) return;
      maybeDoStep(e.clientY - startY);
      e.preventDefault();
      e.stopPropagation();
    }

    function onMouseUp(e){
      if(!mouseDragging) return;
      mouseDragging = false;
      stepDone = false;
      hide();
      if(e){
        e.preventDefault();
        e.stopPropagation();
      }
    }

    document.addEventListener('pointermove', function(e){
      if(dragging) e.preventDefault();
    }, {passive:false});

    document.addEventListener('mousemove', function(e){
      if(mouseDragging) e.preventDefault();
    }, {passive:false});

    hit.addEventListener('pointerdown', onDown, {passive:false, capture:true});
    hit.addEventListener('pointermove', onMove, {passive:false, capture:true});
    hit.addEventListener('pointerup', onUp, {passive:false, capture:true});
    hit.addEventListener('pointercancel', onUp, {passive:false, capture:true});

    hit.addEventListener('mousedown', onMouseDown, {passive:false, capture:true});
    window.addEventListener('mousemove', onMouseMove, true);
    window.addEventListener('mouseup', onMouseUp, true);
    window.addEventListener('blur', onMouseUp);
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init, {once:true});
  } else {
    init();
  }
})();
</script>
<script id="crown_over_top_final">
(function(){
  const hit = document.getElementById('crown_hit');
  const top = document.getElementById('crown_over_top');
  const overlay = document.getElementById('crown_overlay');
  if(!hit || !top) return;

  const BASE_LEFT = 2289;
  const BASE_TOP  = 1171;

  let dragging = false;
  let hasDownMove = false;
  let startY = null;
  let offsetY = 0;
  let phase = 0;
  let stepCount = 0;
  let lastTime = 0;
  let returnAt = 0;
  let mouseDown = false;
  let hovering = false;
  let activePointerId = null;
  let inputMode = 'touch';

  const fb = top.getAttribute('data-fallback');
  if(fb) top.src = fb;

  top.onerror = function(){
    const fb2 = top.getAttribute('data-fallback');
    if(fb2 && top.src !== fb2){
      top.src = fb2;
    }
  };

  function apply(){
    top.style.left = BASE_LEFT + 'px';
    top.style.top  = (BASE_TOP + offsetY) + 'px';
  }

  function showTop(){
    top.style.display = 'block';
    top.style.opacity = '1';
    if(overlay){
      overlay.style.display = 'block';
      overlay.classList.add('m94_on');
    }
  }

  function hideTop(){
    top.style.opacity = '0';
    if(overlay && !dragging){
      overlay.classList.remove('m94_on');
    }
  }

  function stopEvt(e){
    if(!e) return;
    if(typeof e.preventDefault === 'function') e.preventDefault();
    if(typeof e.stopPropagation === 'function') e.stopPropagation();
  }

  function reset(){
    dragging = false;
    mouseDown = false;
    hasDownMove = false;
    startY = null;
    offsetY = 0;
    phase = 0;
    stepCount = 0;
    lastTime = 0;
    returnAt = 0;
    apply();

    if(hovering){
      showTop();
    } else {
      hideTop();
    }
  }

  function begin(y){
    dragging = true;
    hasDownMove = false;
    startY = y;
    offsetY = 0;
    phase = 0;
    stepCount = 0;
    lastTime = 0;
    returnAt = 0;
    showTop();
    apply();
  }

  hit.addEventListener('touchstart', function(e){
    stopEvt(e);
    const y = e.touches && e.touches[0] ? e.touches[0].clientY : 0;
    inputMode = 'touch';
    begin(y);
  }, {passive:false, capture:true});

  hit.addEventListener('touchmove', function(e){
    if(startY == null) return;
    stopEvt(e);
    const y = e.touches && e.touches[0] ? e.touches[0].clientY : 0;
    if(y > startY + 3) hasDownMove = true;
  }, {passive:false, capture:true});

  hit.addEventListener('touchend', reset, {passive:true});
  hit.addEventListener('touchcancel', reset, {passive:true});

  hit.addEventListener('mouseover', function(){
    hovering = true;
    if(!mouseDown && !dragging){
      showTop();
    }
  }, true);

  hit.addEventListener('mouseout', function(){
    hovering = false;
    if(!mouseDown && !dragging){
      hideTop();
    }
  }, true);

  hit.addEventListener('pointerdown', function(e){
    if(e.pointerType !== 'mouse' && e.pointerType !== 'pen') return;
    if(e.button !== 0) return;
    activePointerId = e.pointerId;
    mouseDown = true;
    inputMode = 'mouse';
    stopEvt(e);
    begin(e.clientY);
  }, true);

  window.addEventListener('pointermove', function(e){
    if(activePointerId === null || e.pointerId !== activePointerId || !mouseDown) return;
    stopEvt(e);
    if(startY !== null && e.clientY > startY){
      if(!hasDownMove){
        hasDownMove = true;
        if(phase === 0 && stepCount === 0 && offsetY === 0){
          offsetY = 5;
          stepCount = 1;
          lastTime = performance.now();
          apply();
        }
      }
    }
  }, true);

  window.addEventListener('pointerup', function(e){
    if(activePointerId !== null && e.pointerId !== activePointerId) return;
    activePointerId = null;
    reset();
  }, true);

  window.addEventListener('pointercancel', function(e){
    if(activePointerId !== null && e.pointerId !== activePointerId) return;
    activePointerId = null;
    reset();
  }, true);

  hit.addEventListener('mousedown', function(e){
    if(activePointerId !== null) return;
    if(e.button !== 0) return;
    stopEvt(e);
    mouseDown = true;
    inputMode = 'mouse';
    begin(e.clientY);
  }, true);

  window.addEventListener('mousemove', function(e){
    if(activePointerId !== null) return;
    if(!mouseDown) return;
    stopEvt(e);
    if(startY !== null && e.clientY > startY){
      if(!hasDownMove){
        hasDownMove = true;
        if(phase === 0 && stepCount === 0 && offsetY === 0){
          offsetY = 5;
          stepCount = 1;
          lastTime = performance.now();
          apply();
        }
      }
    }
  }, true);

  window.addEventListener('mouseup', function(){
    if(activePointerId !== null) return;
    reset();
  }, true);

  window.addEventListener('blur', function(){
    activePointerId = null;
    reset();
  });

  function animate(time){
    if(dragging && hasDownMove){
      if(phase === 0){
        if(time - lastTime > 45){
          offsetY += 5;
          stepCount += 1;
          if(stepCount >= 6){
            offsetY = 30;
            if(inputMode === 'mouse'){
              window.dispatchEvent(new CustomEvent('crown-pc-step'));
            }
            phase = 1;
            returnAt = time + 1;
          }
          apply();
          lastTime = time;
        }
      } else if(phase === 1){
        if(time >= returnAt){
          offsetY = 0;
          stepCount = 0;
          phase = 0;
          apply();
          lastTime = time;
        }
      }
    }
    requestAnimationFrame(animate);
  }

  apply();
  hideTop();
  requestAnimationFrame(animate);
})();
</script>

<script id="m161_arrow_js">
(function(){
  const ACTIVE_ARROW_IDS = [
    'ARROW_P1','ARROW_P3','ARROW_P5','ARROW_P6',
    'ARROW_P7','ARROW_P9','ARROW_P10','ARROW_P12'
  ];
  const ALL_ARROW_IDS = [
    'ARROW_P1','ARROW_P2','ARROW_P3','ARROW_P4','ARROW_P5','ARROW_P6','ARROW_P7',
    'ARROW_P8','ARROW_P9','ARROW_P10','ARROW_P11','ARROW_P12','ARROW_P13'
  ];

  function injectSvg(){
    const tpl = document.getElementById('m146_arrow_svg_template');
    if(!tpl) return;
    const svg = tpl.innerHTML;
    document.querySelectorAll('.arrow').forEach(function(el){
      if(!el.innerHTML.trim()) el.innerHTML = svg;
    });
  }

  function hideArrow(el){
    if(!el) return;
    el.classList.remove('show', 'arrowSoft');
    el.style.opacity = '0';
    el.style.visibility = 'hidden';
    el.style.animation = 'none';
  }

  function showArrow(el){
    if(!el) return;
    el.style.opacity = '';
    el.style.visibility = 'visible';
    el.style.animation = '';
    el.classList.add('show', 'arrowSoft');
  }

  function resetAllArrows(){
    ALL_ARROW_IDS.forEach(function(id){
      hideArrow(document.getElementById(id));
    });
  }

  function startSelectedArrows(){
    ACTIVE_ARROW_IDS.forEach(function(id){
      showArrow(document.getElementById(id));
    });
  }

  function initArrows(){
    injectSvg();
    resetAllArrows();

    window.setTimeout(function(){
      startSelectedArrows();

      window.setTimeout(function(){
        resetAllArrows();
      }, 3000);
    }, 1000);
  }

  window.addEventListener('load', initArrows, {once:true});
})();
</script>

<script id="m225_dial_progressive">
(function(){
  const dial = document.getElementById('dial');
  if(!dial) return;
  const fullSrc = dial.getAttribute('data-full-src');
  if(!fullSrc) return;
  const preload = new Image();
  preload.decoding = 'async';
  preload.fetchPriority = 'high';
  preload.src = fullSrc;
  const swap = function(){
    try {
      if (preload.decode) {
        preload.decode().catch(function(){}).finally(function(){ dial.src = fullSrc; dial.setAttribute('data-dial-ready','1'); });
      } else {
        dial.src = fullSrc;
        dial.setAttribute('data-dial-ready','1');
      }
    } catch(e) {
      dial.src = fullSrc;
      dial.setAttribute('data-dial-ready','1');
    }
  };
  if (preload.complete) swap();
  else preload.onload = swap;
})();
</script>
